<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لا يوجد اتصال — مكاني Spot</title>
<meta name="theme-color" content="#FF6B00">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', 'Segoe UI', Arial, sans-serif;
    background: #0C0C0C; color: #fff;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .wrap { max-width: 360px; }
  .icon {
    width: 96px; height: 96px; margin: 0 auto 28px;
    background: rgba(255,107,0,0.12);
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
  }
  .icon svg { width: 48px; height: 48px; color: #FF6B00; }
  h1 { font-size: 22px; font-weight: 900; margin-bottom: 12px; }
  p  { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; margin-bottom: 28px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #FF6B00; color: #fff; border: none;
    border-radius: 50px; padding: 13px 28px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    transition: background .2s;
  }
  .btn:hover { background: #e05500; }
  .logo {
    font-size: 20px; font-weight: 900; color: #FF6B00;
    margin-bottom: 36px; display: block;
  }
</style>
</head>
<body>
<div class="wrap">
  <span class="logo">مكاني Spot</span>

  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>
    يبدو أن اتصالك بالإنترنت منقطع.<br>
    تأكد من الاتصال ثم حاول مجدداً.
  </p>

  <button class="btn" onclick="window.location.reload()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    إعادة المحاولة
  </button>
</div>
</body>
</html>
