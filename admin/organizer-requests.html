<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="0; url=/admin/bazaar-dashboard.html#org-ver">
<title>مكاني Spot — طلبات منظّمي البازارات (تم النقل)</title>
<script>window.location.replace('/admin/bazaar-dashboard.html');</script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════ */
:root {
  --bg:    #080810;
  --bg2:   #0d0d1a;
  --bg3:   #12121f;
  --bg4:   #1a1a2e;
  --bg5:   #222238;
  --or:    #F36418;
  --or2:   #ff8c3a;
  --org:   rgba(255,107,0,.12);
  --bdo:   rgba(255,107,0,.3);
  --tx:    #e8e8f0;
  --mu:    #6b6b8a;
  --mu2:   #3a3a55;
  --bd:    rgba(255,255,255,.06);
  --gr:    #22C55E;
  --rd:    #EF4444;
  --yw:    #F59E0B;
  --bl:    #60A5FA;
  --pu:    #A78BFA;
  --tl:    #2DD4BF;
  --r:     10px;
  --sh:    0 8px 40px rgba(0,0,0,.6);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════════════
   ANIMATED BACKGROUND
══════════════════════════════════════ */
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,107,0,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,107,0,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
.bg-glow {
  position: fixed; width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,107,0,.06) 0%, transparent 70%);
  border-radius: 50%; top: -200px; left: -200px;
  pointer-events: none; z-index: 0;
  animation: driftGlow 20s ease-in-out infinite alternate;
}
@keyframes driftGlow {
  0%   { transform: translate(0,0); }
  100% { transform: translate(300px, 200px); }
}

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); padding: 20px;
}
.login-card {
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 20px; padding: 40px 44px;
  width: 100%; max-width: 420px;
  box-shadow: var(--sh), 0 0 80px rgba(255,107,0,.05);
  animation: loginIn .4s ease; position: relative; overflow: hidden;
}
.login-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--or), transparent);
}
@keyframes loginIn { from { opacity: 0; transform: translateY(20px); } }
.login-logo { text-align: center; margin-bottom: 32px; }
.lock-icon { font-size: 48px; margin-bottom: 10px; }
.brand { font-size: 22px; font-weight: 900; color: var(--or); }
.sub { font-size: 12px; color: var(--mu); margin-top: 4px; letter-spacing: 1px; }
.login-label { display: block; font-size: 12px; color: var(--mu); margin-bottom: 8px; font-weight: 600; letter-spacing: .5px; }
.login-input-wrap { position: relative; margin-bottom: 16px; }
.login-input {
  width: 100%; padding: 13px 16px; border-radius: var(--r);
  background: var(--bg3); border: 1.5px solid var(--mu2);
  color: var(--tx); font-family: 'Space Mono', monospace;
  font-size: 18px; letter-spacing: 4px; outline: none;
  transition: border-color .2s;
}
.login-input:focus { border-color: var(--or); }
.login-btn {
  width: 100%; padding: 13px; border-radius: var(--r);
  background: var(--or); border: none; color: #fff;
  font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .2s; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}
.login-btn:hover { background: var(--or2); transform: translateY(-1px); }
.login-err { color: var(--rd); font-size: 12.5px; text-align: center; margin-top: 12px; display: none; }
.login-err.show { display: block; }

/* ══════════════════════════════════════
   MAIN DASHBOARD
══════════════════════════════════════ */
#dashboard {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto;
  padding: 24px 20px 60px;
  display: none;
}

/* TOPBAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 14px; padding: 14px 20px;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.logo-text { font-size: 18px; font-weight: 900; color: var(--or); }
.topbar-badge { font-size: 10px; background: var(--org); color: var(--or); border: 1px solid var(--bdo); border-radius: 20px; padding: 2px 8px; font-weight: 700; letter-spacing: .5px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.back-btn {
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--bd);
  background: var(--bg3); color: var(--tx); font-family: 'Cairo', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
}
.back-btn:hover { border-color: var(--or); color: var(--or); }
.logout-btn {
  padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(239,68,68,.3);
  background: transparent; color: var(--rd); font-family: 'Cairo', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.logout-btn:hover { background: rgba(239,68,68,.1); }

/* SECTION TITLE */
.sec-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--mu); text-transform: uppercase; margin-bottom: 12px; margin-top: 28px;
}

/* STATS GRID */
.stats-grid {
  display: grid; grid-template-columns: repeat(5,1fr); gap: 10px;
  margin-bottom: 4px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 12px; padding: 16px 14px; text-align: center;
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--bdo); }
.stat-num {
  font-size: 28px; font-weight: 900; line-height: 1;
  font-family: 'Space Mono', monospace;
}
.stat-lbl { font-size: 11px; color: var(--mu); margin-top: 5px; font-weight: 600; }
.stat-or  { color: var(--or); }
.stat-yw  { color: var(--yw); }
.stat-gr  { color: var(--gr); }
.stat-rd  { color: var(--rd); }
.stat-bl  { color: var(--bl); }

/* FILTER BAR */
.filter-bar {
  display: flex; gap: 8px; align-items: center;
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-label { font-size: 12px; color: var(--mu); font-weight: 600; margin-left: 4px; }
.filter-btn {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--bd); background: var(--bg3);
  color: var(--mu); font-family: 'Cairo', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.filter-btn.active-all   { background: var(--org); border-color: var(--bdo); color: var(--or); }
.filter-btn.active-pend  { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.4); color: var(--yw); }
.filter-btn.active-appr  { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.4); color: var(--gr); }
.filter-btn.active-rej   { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.4); color: var(--rd); }
.filter-spacer { flex: 1; }
.search-input {
  padding: 7px 12px; border-radius: 8px;
  background: var(--bg3); border: 1px solid var(--bd);
  color: var(--tx); font-family: 'Cairo', sans-serif; font-size: 12px;
  outline: none; width: 220px; transition: border-color .2s;
}
.search-input:focus { border-color: var(--bdo); }
.search-input::placeholder { color: var(--mu); }

/* REQUESTS LIST */
.requests-list { display: flex; flex-direction: column; gap: 12px; }
.req-card {
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 14px; overflow: hidden;
  transition: border-color .2s;
}
.req-card:hover { border-color: rgba(255,255,255,.12); }
.req-card.pend  { border-right: 3px solid var(--yw); }
.req-card.appr  { border-right: 3px solid var(--gr); }
.req-card.rej   { border-right: 3px solid var(--rd); opacity: .7; }

.req-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
  user-select: none;
}
.req-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.req-main { flex: 1; min-width: 0; }
.req-name { font-size: 14px; font-weight: 700; color: var(--tx); }
.req-meta { font-size: 11px; color: var(--mu); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
.req-date { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--mu); margin-right: auto; }
.req-status-badge {
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
}
.rsb-pend { background: rgba(245,158,11,.15); color: var(--yw); border: 1px solid rgba(245,158,11,.3); }
.rsb-appr { background: rgba(34,197,94,.12); color: var(--gr); border: 1px solid rgba(34,197,94,.3); }
.rsb-rej  { background: rgba(239,68,68,.1); color: var(--rd); border: 1px solid rgba(239,68,68,.3); }
.req-toggle { font-size: 12px; color: var(--mu); }

/* REQ BODY (expanded) */
.req-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--bd); }
.req-body.open { display: block; }

.req-details-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 14px;
}
.req-detail-item { }
.rdi-label { font-size: 10px; color: var(--mu); font-weight: 600; letter-spacing: .3px; margin-bottom: 3px; }
.rdi-value {
  font-size: 13px; color: var(--tx); font-weight: 600;
  background: var(--bg3); border: 1px solid var(--bd);
  border-radius: 7px; padding: 7px 10px; word-break: break-all;
}
.rdi-value a { color: var(--bl); text-decoration: none; }
.rdi-value a:hover { text-decoration: underline; }

/* ID Images */
.id-images { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.id-img-wrap { }
.id-img-label { font-size: 10px; color: var(--mu); font-weight: 600; margin-bottom: 6px; }
.id-img-box {
  background: var(--bg3); border: 1px solid var(--bd);
  border-radius: 10px; overflow: hidden;
  aspect-ratio: 16/10; display: flex;
  align-items: center; justify-content: center;
  cursor: pointer; transition: border-color .2s; position: relative;
}
.id-img-box:hover { border-color: var(--bdo); }
.id-img-box img {
  width: 100%; height: 100%; object-fit: cover;
  transition: opacity .3s;
}
.id-img-box .img-loading {
  position: absolute; font-size: 12px; color: var(--mu);
}
.id-img-placeholder { font-size: 12px; color: var(--mu); text-align: center; }

/* Experience */
.exp-section { margin-top: 14px; }
.exp-title { font-size: 11px; color: var(--mu); font-weight: 700; margin-bottom: 8px; letter-spacing: .5px; text-transform: uppercase; }
.exp-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.exp-chip {
  background: var(--bg4); border: 1px solid var(--bd);
  border-radius: 6px; padding: 4px 10px;
  font-size: 11.5px; color: var(--tx);
}
.exp-desc {
  margin-top: 8px; font-size: 12px; color: var(--tx);
  background: var(--bg3); border: 1px solid var(--bd);
  border-radius: 8px; padding: 10px 12px; line-height: 1.7;
}

/* Action buttons */
.req-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
.action-approve {
  padding: 9px 20px; border-radius: 9px;
  background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.4);
  color: var(--gr); font-family: 'Cairo', sans-serif; font-size: 13px;
  font-weight: 700; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.action-approve:hover { background: rgba(34,197,94,.25); }
.action-approve:disabled { opacity: .5; cursor: not-allowed; }
.action-reject {
  padding: 9px 20px; border-radius: 9px;
  background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
  color: var(--rd); font-family: 'Cairo', sans-serif; font-size: 13px;
  font-weight: 700; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.action-reject:hover { background: rgba(239,68,68,.2); }
.action-reject:disabled { opacity: .5; cursor: not-allowed; }
.action-reset {
  padding: 9px 16px; border-radius: 9px;
  background: transparent; border: 1px solid var(--bd);
  color: var(--mu); font-family: 'Cairo', sans-serif; font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all .2s;
}
.action-reset:hover { border-color: var(--bdo); color: var(--or); }
.action-status-tag { font-size: 11px; color: var(--mu); margin-right: auto; }

/* ORGANIZERS LEADERBOARD */
.org-list { display: flex; flex-direction: column; gap: 8px; }
.org-item {
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  transition: border-color .2s;
}
.org-item:hover { border-color: rgba(255,255,255,.1); }
.org-rank {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; font-family: 'Space Mono', monospace;
  color: var(--mu); flex-shrink: 0;
}
.org-rank.gold   { background: rgba(245,158,11,.15); border-color: rgba(245,158,11,.4); color: var(--yw); }
.org-rank.silver { background: rgba(96,165,250,.1); border-color: rgba(96,165,250,.3); color: var(--bl); }
.org-rank.bronze { background: rgba(167,139,250,.1); border-color: rgba(167,139,250,.3); color: var(--pu); }
.org-info { flex: 1; min-width: 0; }
.org-name { font-size: 13px; font-weight: 700; }
.org-sub { font-size: 11px; color: var(--mu); margin-top: 2px; }
.org-stats { display: flex; gap: 16px; flex-shrink: 0; }
.org-stat { text-align: center; }
.org-stat-num { font-size: 16px; font-weight: 900; font-family: 'Space Mono', monospace; }
.org-stat-lbl { font-size: 9px; color: var(--mu); font-weight: 600; }
.org-badge {
  padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700;
  background: rgba(34,197,94,.12); color: var(--gr);
  border: 1px solid rgba(34,197,94,.3);
}

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 60px 20px;
  background: var(--bg2); border: 1px dashed var(--mu2);
  border-radius: 14px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(--mu); }

/* LOADING */
.loading-pulse {
  text-align: center; padding: 40px;
  color: var(--mu); font-size: 13px;
}

/* IMAGE LIGHTBOX */
#lightbox {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.9);
  display: none; align-items: center; justify-content: center;
  cursor: zoom-out;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
#lightbox-close {
  position: fixed; top: 20px; left: 20px;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--bd);
  color: var(--tx); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 10000;
}

/* TOAST */
#toast-wrap {
  position: fixed; bottom: 20px; left: 20px;
  z-index: 9998; display: flex; flex-direction: column; gap: 6px;
}
.toast {
  padding: 9px 14px; border-radius: 8px;
  font-size: 12.5px; font-weight: 600;
  box-shadow: var(--sh); animation: sli .25s ease;
  display: flex; align-items: center; gap: 6px;
}
.toast-s { background: var(--bg2); border: 1px solid var(--gr); color: var(--gr); }
.toast-e { background: var(--bg2); border: 1px solid var(--rd); color: var(--rd); }
.toast-i { background: var(--bg2); border: 1px solid var(--or); color: var(--or); }
@keyframes sli { from { transform: translateX(-14px); opacity: 0; } }

/* RESPONSIVE */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(3,1fr); }
  .req-details-grid { grid-template-columns: 1fr; }
  .id-images { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  #dashboard { padding: 14px 12px 40px; }
  .search-input { width: 100%; }
}
</style>

<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="lock-icon">🎪</div>
      <div class="brand">مكاني Spot</div>
      <div class="sub">ORGANIZER REQUESTS</div>
    </div>
    <label class="login-label" for="pw-input">كلمة الدخول</label>
    <div class="login-input-wrap">
      <input type="password" id="pw-input" class="login-input"
        placeholder="••••••••••••"
        onkeydown="if(event.key==='Enter')tryLogin()"
        autocomplete="off" autofocus>
    </div>
    <button class="login-btn" onclick="tryLogin()">
      <span>🚀</span> دخول
    </button>
    <div class="login-err" id="login-err">كلمة السر غير صحيحة — حاول مرة أخرى</div>
  </div>
</div>

<!-- MAIN -->
<div id="dashboard">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo-text">مكاني Spot</div>
      <span class="topbar-badge">طلبات المنظّمين</span>
    </div>
    <div class="topbar-right">
      <a href="./admin-hub.html" class="back-btn">← العودة للهاب</a>
      <button class="logout-btn" onclick="doLogout()">🚪 خروج</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="sec-title">إحصائيات المنظّمين</div>
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-num stat-or" id="s-total">—</div>
      <div class="stat-lbl">إجمالي الطلبات</div>
    </div>
    <div class="stat-card">
      <div class="stat-num stat-yw" id="s-pending">—</div>
      <div class="stat-lbl">قيد المراجعة</div>
    </div>
    <div class="stat-card">
      <div class="stat-num stat-gr" id="s-approved">—</div>
      <div class="stat-lbl">مقبولة</div>
    </div>
    <div class="stat-card">
      <div class="stat-num stat-rd" id="s-rejected">—</div>
      <div class="stat-lbl">مرفوضة</div>
    </div>
    <div class="stat-card">
      <div class="stat-num stat-bl" id="s-active">—</div>
      <div class="stat-lbl">منظّم نشط</div>
    </div>
  </div>

  <!-- REQUESTS -->
  <div class="sec-title">الطلبات المقدَّمة</div>
  <div class="filter-bar">
    <span class="filter-label">تصفية:</span>
    <button class="filter-btn active-all" data-filter="all" onclick="setFilter('all')">الكل</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">⏳ قيد المراجعة</button>
    <button class="filter-btn" data-filter="approved" onclick="setFilter('approved')">✅ مقبول</button>
    <button class="filter-btn" data-filter="rejected" onclick="setFilter('rejected')">❌ مرفوض</button>
    <div class="filter-spacer"></div>
    <input class="search-input" type="text" id="search-input"
      placeholder="🔍 ابحث بالاسم أو الهاتف أو المنطقة"
      oninput="renderRequests()">
  </div>

  <div id="requests-container">
    <div class="loading-pulse">⏳ جاري تحميل الطلبات...</div>
  </div>

  <!-- ACTIVE ORGANIZERS LEADERBOARD -->

async function hashText(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function tryLogin() {
  const pw = document.getElementById('pw-input').value;
  const hashed = await hashText(pw);
  if (hashed === ADMIN_HASH) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-err').classList.add('show');
    document.getElementById('pw-input').value = '';
  }
}
function doLogout() {
  sessionStorage.removeItem('admin_auth');

/* ══════════════════════════════════════
   SUPABASE HELPERS
══════════════════════════════════════ */
async function sbGet(path) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function sbPatch(table, id, data) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function sbPatchWhere(table, column, value, data) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${column}=eq.${value}`, {
    method: 'PATCH',
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function sbUpsert(table, conflictCol, data) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${conflictCol}`, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=representation'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

/* ══════════════════════════════════════
   STORAGE IMAGE URL
══════════════════════════════════════ */
function getStorageUrl(path) {
  if (!path) return null;
  return `${SB_URL}/storage/v1/object/public/organizer-docs/${path}`;
}

/* ══════════════════════════════════════
   LOAD DATA
══════════════════════════════════════ */
async function loadAll() {
  try {
    // Load requests with profile join
    const [reqData, orgData, bazaarData] = await Promise.all([
      sbGet('organizer_requests?select=*&order=created_at.desc'),
      sbGet('organizer_profiles?select=*'),
      sbGet('bazaars?select=organizer_id,status')
    ]);

    allRequests = reqData || [];
    const orgProfiles = orgData || [];
    const bazaars = bazaarData || [];

    // Count bazaars per organizer
    const bazaarCount = {};
    bazaars.forEach(b => {
      if (b.organizer_id) {
        bazaarCount[b.organizer_id] = (bazaarCount[b.organizer_id] || 0) + 1;
      }
    });

    // Build active organizers list
    allOrganizers = orgProfiles
      .filter(op => op.is_verified)
      .map(op => ({
        ...op,
        bazaar_count: bazaarCount[op.user_id] || 0,
        // find matching request for name/phone info
        req: allRequests.find(r => r.user_id === op.user_id && r.status === 'approved')
      }))
      .sort((a, b) => b.bazaar_count - a.bazaar_count);

    // Stats
    updateStats(allRequests, allOrganizers);
    renderRequests();
    renderLeaderboard();

  } catch (err) {
    console.error(err);
    showToast('❌ خطأ في تحميل البيانات: ' + err.message, 'e');
    document.getElementById('requests-container').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">خطأ في تحميل البيانات. تحقق من الاتصال.</div></div>`;
  }
}

function updateStats(reqs, orgs) {
  const total    = reqs.length;
  const pending  = reqs.filter(r => r.status === 'pending').length;
  const approved = reqs.filter(r => r.status === 'approved').length;
  const rejected = reqs.filter(r => r.status === 'rejected').length;
  const active   = orgs.length;

  document.getElementById('s-total').textContent    = total;
  document.getElementById('s-pending').textContent  = pending;
  document.getElementById('s-approved').textContent = approved;
  document.getElementById('s-rejected').textContent = rejected;
  document.getElementById('s-active').textContent   = active;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = 'filter-btn';
    if (btn.dataset.filter === f) btn.className += ' active-' + (f === 'all' ? 'all' : f === 'pending' ? 'pend' : f === 'approved' ? 'appr' : 'rej');
  });
  renderRequests();
}

/* ══════════════════════════════════════
   RENDER REQUESTS
══════════════════════════════════════ */
function renderRequests() {
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  let list = allRequests;

  if (currentFilter !== 'all') list = list.filter(r => r.status === currentFilter);
  if (search) {
    list = list.filter(r =>
      (r.full_name  || '').toLowerCase().includes(search) ||
      (r.phone      || '').toLowerCase().includes(search) ||
      (r.region     || '').toLowerCase().includes(search)
    );
  }

  const container = document.getElementById('requests-container');
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">لا توجد طلبات تطابق التصفية الحالية.</div></div>`;
    return;
  }

  container.innerHTML = `<div class="requests-list">${list.map(reqCardHTML).join('')}</div>`;
}

      ❌ رفض الطلب
    </button>

    <button class="action-reject" onclick="rejectRequest('${r.id}');event.stopPropagation()">
      ❌ سحب الموافقة
    </button>

    <button class="action-approve" onclick="approveRequest('${r.id}','${r.user_id}');event.stopPropagation()">
      ✅ قبول الطلب
    </button>

        <div class="req-detail-item">
          <div class="rdi-label">📍 المنطقة</div>

══════════════════════════════════════ */
function toggleReq(id) {
  const body   = document.getElementById(`rb-${id}`);
  const toggle = document.getElementById(`rt-${id}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  toggle.textContent = isOpen ? '▼' : '▲';
}

/* ══════════════════════════════════════
   ACTIONS
══════════════════════════════════════ */
async function approveRequest(reqId, userId) {
  if (!confirm('تأكيد قبول الطلب؟ سيحصل المستخدم على صلاحيات منظّم بازارات.')) return;

  const tag = document.getElementById(`ast-${reqId}`);
  if (tag) tag.textContent = '⏳ جاري المعالجة…';

  try {
    // 1. Update organizer_requests status
    await sbPatch('organizer_requests', reqId, { status: 'approved' });

    // 2. Upsert organizer_profiles to set is_verified = true
    await sbUpsert('organizer_profiles', 'user_id', { user_id: userId, is_verified: true });

    // Update local data
    const req = allRequests.find(r => r.id === reqId);
    if (req) req.status = 'approved';

    showToast('✅ تم قبول الطلب وتفعيل حساب المنظّم', 's');
    updateStats(allRequests, allOrganizers);
    renderRequests();
    await loadAll(); // reload to refresh leaderboard
  } catch (err) {
    console.error(err);
    if (tag) tag.textContent = '❌ فشل التحديث';
    showToast('❌ خطأ: ' + err.message, 'e');
  }
}

async function rejectRequest(reqId) {
  if (!confirm('تأكيد رفض / سحب الموافقة على هذا الطلب؟')) return;

  const tag = document.getElementById(`ast-${reqId}`);
  if (tag) tag.textContent = '⏳ جاري المعالجة…';

  try {
    await sbPatch('organizer_requests', reqId, { status: 'rejected' });

    // Find request to get user_id and revoke organizer profile
    const req = allRequests.find(r => r.id === reqId);
    if (req?.user_id) {
      await sbPatchWhere('organizer_profiles', 'user_id', req.user_id, { is_verified: false });
    }

    if (req) req.status = 'rejected';
    showToast('❌ تم رفض الطلب وسحب صلاحيات المنظّم', 'e');
    updateStats(allRequests, allOrganizers);
    renderRequests();
    await loadAll();
  } catch (err) {
    console.error(err);
    if (tag) tag.textContent = '❌ فشل التحديث';
    showToast('❌ خطأ: ' + err.message, 'e');
  }
}

async function resetRequest(reqId) {
  if (!confirm('إعادة الطلب لحالة "قيد المراجعة"؟')) return;

  const tag = document.getElementById(`ast-${reqId}`);
  if (tag) tag.textContent = '⏳ جاري المعالجة…';

  try {
    await sbPatch('organizer_requests', reqId, { status: 'pending' });
    const req = allRequests.find(r => r.id === reqId);
    if (req) req.status = 'pending';
    showToast('🔄 تمت إعادة الطلب لقيد المراجعة', 'i');
    renderRequests();
  } catch (err) {
    console.error(err);
    if (tag) tag.textContent = '❌ فشل التحديث';
    showToast('❌ خطأ: ' + err.message, 'e');
  }
}

/* ══════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════ */
function renderLeaderboard() {
  const container = document.getElementById('leaderboard-container');
  if (!allOrganizers.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">لا يوجد منظّمون نشطون حتى الآن.</div></div>`;
    return;
  }

  const rows = allOrganizers.map((org, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
    const rankLabel = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
    const name = org.req?.full_name || org.name || 'منظّم مجهول';
    const phone = org.req?.phone || org.phone || '—';
    const region = org.req?.region || org.region || '—';

    return `
    <div class="org-item">
      <div class="org-rank ${rankClass}">${rankLabel}</div>
      <div class="org-info">
        <div class="org-name">🎪 ${escHtml(name)}</div>
        <div class="org-sub">📞 ${escHtml(phone)} &nbsp;|&nbsp; 📍 ${escHtml(region)}</div>
        <div class="org-sub" style="margin-top:2px;font-family:'Space Mono',monospace;font-size:9px;color:var(--mu)">${escHtml(org.user_id || '')}</div>
      </div>
      <div class="org-stats">
        <div class="org-stat">
          <div class="org-stat-num" style="color:var(--or)">${org.bazaar_count}</div>
          <div class="org-stat-lbl">بازار</div>
        </div>
      </div>
      <span class="org-badge">✅ نشط</span>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="org-list">${rows}</div>`;
}

/* ══════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════ */
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
function showToast(msg, type = 'i') {
  const wrap = document.getElementById('toast-wrap');
  const div = document.createElement('div');
  div.className = `toast toast-${type}`;
  div.textContent = msg;
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
