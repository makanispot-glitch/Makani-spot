<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>مكاني Spot — لوحة تحكم المساحات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810;--bg2:#0d0d1a;--bg3:#12121f;--bg4:#1a1a2e;--bg5:#222238;
  --or:#F36418;--or2:#ff8c3a;--org:rgba(255,107,0,.12);--bdo:rgba(255,107,0,.3);
  --tx:#e8e8f0;--tx2:#b0b0c8;--mu:#6b6b8a;--mu2:#3a3a55;--bd:rgba(255,255,255,.07);
  --gr:#22C55E;--rd:#EF4444;--yw:#F59E0B;--bl:#60A5FA;--pu:#A78BFA;--tl:#2DD4BF;
  --r:10px;--r2:14px;--sb:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
a{color:var(--or);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;color:var(--tx)}

.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,107,0,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* ── Login ── */
#login-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(8,8,16,.97);backdrop-filter:blur(4px)}
.login-box{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:40px 36px;width:360px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.login-logo{text-align:center;font-size:36px;margin-bottom:8px}
.login-title{text-align:center;font-size:18px;font-weight:800;color:var(--or);margin-bottom:4px}
.login-sub{text-align:center;font-size:12px;color:var(--mu);margin-bottom:24px}
.login-inp{width:100%;background:var(--bg4);border:1.5px solid var(--mu2);border-radius:var(--r);padding:12px 14px;font-size:14px;color:var(--tx);margin-bottom:12px;outline:none;transition:border-color .2s}
.login-inp:focus{border-color:var(--or)}
.login-btn{width:100%;background:var(--or);border:none;border-radius:var(--r);padding:13px;font-size:15px;font-weight:700;color:#fff;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-err{margin-top:10px;color:var(--rd);font-size:12px;text-align:center;min-height:16px}

/* ── App shell ── */
#app{display:none;min-height:100vh;position:relative;z-index:1}
#app.visible{display:flex}

/* ── Sidebar ── */
.sidebar{position:fixed;top:0;right:0;width:var(--sb);height:100vh;background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column;z-index:100;transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:12px;padding:20px 18px 16px;border-bottom:1px solid var(--bd)}
.sb-logo-ico{font-size:28px}
.sb-logo-name{font-size:14px;font-weight:800;color:var(--or)}
.sb-logo-sub{font-size:10px;color:var(--mu);margin-top:1px}
.sb-nav{flex:1;padding:10px 8px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .18s;margin-bottom:2px;position:relative}
.sb-item:hover{background:var(--bg3);color:var(--tx)}
.sb-item.active{background:var(--org);color:var(--or);border:1px solid var(--bdo)}
.sb-ico{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sb-badge{background:var(--rd);color:#fff;border-radius:10px;font-size:10px;font-weight:800;padding:1px 7px;margin-right:auto}
.sb-sep{height:1px;background:var(--bd);margin:8px 12px}
.sb-bottom{padding:12px 8px 20px;border-top:1px solid var(--bd)}
.sb-logout{width:100%;background:transparent;border:1px solid var(--mu2);border-radius:var(--r);padding:9px;font-size:12px;font-weight:700;color:var(--mu);transition:all .2s}
.sb-logout:hover{border-color:var(--rd);color:var(--rd)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}

/* ── Main wrap ── */
.main-wrap{margin-right:var(--sb);min-height:100vh;display:flex;flex-direction:column;transition:margin-right .28s}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
.topbar-menu{background:transparent;border:none;color:var(--tx2);font-size:20px;padding:4px 8px;border-radius:6px;transition:color .2s;display:none}
.topbar-menu:hover{color:var(--or)}
.topbar-title{font-size:16px;font-weight:800;color:var(--tx);flex:1}
.topbar-actions{display:flex;gap:8px;align-items:center}
.tbtn{background:var(--bg4);border:1px solid var(--bd);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--tx2);transition:all .2s}
.tbtn:hover{border-color:var(--or);color:var(--or)}
.tbtn-primary{background:var(--or);border-color:var(--or);color:#fff}
.tbtn-primary:hover{opacity:.88}

/* ── Page body ── */
.page-body{flex:1;overflow-y:auto}
.page{display:none;padding:24px}
.page.active{display:block}

/* ── Overview stat cards ── */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 18px;display:flex;flex-direction:column;gap:4px;transition:border-color .2s}
.stat-card:hover{border-color:var(--bdo)}
.stat-card-ico{font-size:20px;margin-bottom:4px}
.stat-card-val{font-size:26px;font-weight:900;font-family:'IBM Plex Mono',monospace;line-height:1}
.stat-card-lbl{font-size:11px;color:var(--mu);font-weight:600;margin-top:2px}

/* ── Section headers ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:800;color:var(--tx)}
.sec-sub{font-size:11px;color:var(--mu);margin-top:2px}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.f-inp,.f-sel{background:var(--bg3);border:1.5px solid var(--mu2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--tx);outline:none;transition:border-color .2s}
.f-inp:focus,.f-sel:focus{border-color:var(--or)}
.f-sel{cursor:pointer}

/* ── Stats chips ── */
.stats-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.stat-chip{background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.stat-num{font-size:14px;font-weight:900;font-family:'IBM Plex Mono',monospace}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.b-approved{background:rgba(34,197,94,.15);color:#22C55E;border:1px solid rgba(34,197,94,.3)}
.b-pending {background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.3)}
.b-rejected  {background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.3)}
.b-contacted {background:rgba(96,165,250,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.3)}
.b-activated {background:rgba(52,211,153,.15);color:#34D399;border:1px solid rgba(52,211,153,.3)}
.b-active  {background:rgba(96,165,250,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.3)}
.b-hidden  {background:rgba(107,107,138,.15);color:#6b6b8a;border:1px solid rgba(107,107,138,.3)}
.b-broker  {background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.35)}
.b-pro     {background:rgba(251,191,36,.15);color:#FBBF24;border:1px solid rgba(251,191,36,.3)}
.b-growth  {background:rgba(52,211,153,.15);color:#34D399;border:1px solid rgba(52,211,153,.3)}
.b-starter {background:rgba(107,107,138,.12);color:#6b6b8a;border:1px solid rgba(107,107,138,.25)}
.b-dormant {background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.25)}
.b-ok      {background:rgba(34,197,94,.12);color:#22C55E;border:1px solid rgba(34,197,94,.25)}
.b-sub-ok  {background:rgba(34,197,94,.12);color:#22C55E;border:1px solid rgba(34,197,94,.28)}
.b-sub-warn{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.28)}
.b-sub-exp {background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.28)}
.b-sub-none{background:rgba(107,107,138,.10);color:#6b6b8a;border:1px solid rgba(107,107,138,.22)}
.b-suspended{background:rgba(239,68,68,.18);color:#EF4444;border:1px solid rgba(239,68,68,.4)}

/* ── Tables ── */
.t-wrap{overflow-x:auto}
.t{width:100%;border-collapse:collapse;font-size:12px}
.t th{background:var(--bg4);padding:10px 12px;text-align:right;font-weight:700;color:var(--mu);border-bottom:1px solid var(--bd);white-space:nowrap}
.t td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.t tr.sp-row:hover td{background:rgba(255,107,0,.04)}
.t tr.sp-row{cursor:pointer}
.t tr.unit-row td{background:var(--bg2);padding:8px 12px 8px 20px;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
.exp-ico{transition:transform .2s;display:inline-block;color:var(--mu);font-size:10px}
.exp-ico.open{transform:rotate(90deg)}

/* ── Action buttons ── */
.btn{border:none;border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.82}
.btn-ok  {background:rgba(34,197,94,.18);color:#22C55E}
.btn-err {background:rgba(239,68,68,.18);color:#EF4444}
.btn-neu {background:var(--bg5);color:var(--tx2);border:1px solid var(--bd)}
.btn-or  {background:var(--or);color:#fff}
.btn-yw  {background:rgba(245,158,11,.18);color:#F59E0B}
.btn-bl  {background:rgba(96,165,250,.18);color:#60A5FA}

/* ── Pending cards ── */
.p-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;display:flex;gap:16px;align-items:flex-start;transition:border-color .2s;margin-bottom:12px}
.p-card:hover{border-color:var(--bdo)}
.p-thumb{width:80px;height:72px;border-radius:var(--r);overflow:hidden;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:28px}
.p-thumb img{width:100%;height:100%;object-fit:cover}
.p-info{flex:1;min-width:0}
.p-name{font-size:15px;font-weight:800;color:var(--tx);margin-bottom:6px}
.p-meta{font-size:11px;color:var(--mu);line-height:1.8;margin-bottom:10px}
.p-meta b{color:var(--tx2)}
.p-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── Detail panel ── */
.detail-panel{background:var(--bg2);border-top:1px solid rgba(255,107,0,.15);padding:16px 20px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:12px}
.detail-field{background:var(--bg3);border-radius:8px;padding:8px 10px}
.detail-key{font-size:10px;color:var(--mu);margin-bottom:2px}
.detail-val{font-size:12px;font-weight:600;color:var(--tx);word-break:break-word}
.detail-imgs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.detail-img{width:80px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--bd)}

/* ── Mini unit table ── */
.ut{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.ut th{background:var(--bg3);padding:6px 10px;color:var(--mu);font-weight:700;text-align:right}
.ut td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03)}

/* ── Form ── */
.form-wrap{max-width:840px}
.form-sec{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:22px;margin-bottom:16px}
.form-sec-title{font-size:13px;font-weight:800;color:var(--or);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:600;color:var(--tx2)}
.fl .rq{color:var(--rd)}
.fc{background:var(--bg4);border:1.5px solid var(--mu2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--tx);outline:none;transition:border-color .2s;width:100%}
.fc:focus{border-color:var(--or)}
textarea.fc{resize:vertical;min-height:72px}

/* ── Upload ── */
.upload-zone{border:2px dashed rgba(255,107,0,.3);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;background:var(--org);transition:all .2s}
.upload-zone:hover{border-color:var(--or);background:rgba(255,107,0,.16)}
.upload-zone-ico{font-size:24px;margin-bottom:4px}
.upload-zone-lbl{font-size:11px;color:var(--or);font-weight:600}
.upload-status{font-size:11px;margin-top:4px}
.chip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:6px}
.pick-chip{display:flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--bd);border-radius:8px;padding:7px 9px;font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer;user-select:none;transition:all .18s}
.pick-chip:hover{border-color:var(--or);color:var(--tx)}
.pick-chip input{accent-color:var(--or)}
.pick-chip:has(input:checked){background:var(--org);border-color:var(--bdo);color:var(--or)}
.form-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
/* ── Bulk action bar ── */
.bulk-bar{position:sticky;top:57px;z-index:20;background:var(--or);color:#fff;border-radius:var(--r);padding:9px 16px;display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(255,107,0,.4);animation:toastIn .2s ease}
.bulk-bar .btn{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);font-size:11px}
.bulk-bar .btn:hover{background:rgba(255,255,255,.32)}
/* ── Sortable columns ── */
.t th.sortable{cursor:pointer;user-select:none;transition:color .15s;white-space:nowrap}
.t th.sortable:hover{color:var(--or)}
.t th.sort-asc::after{content:' ▲';font-size:8px;opacity:.8}
.t th.sort-desc::after{content:' ▼';font-size:8px;opacity:.8}
/* ── Pagination bar ── */
.pg-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 0;font-size:12px;border-top:1px solid var(--bd)}
/* ── SLA badges ── */
.sla-late{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.35);border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap}
.sla-warn{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.35);border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap}
.sla-ok{font-size:10px;color:var(--mu)}
/* ── Audit log ── */
.audit-row{display:grid;grid-template-columns:130px 80px 1fr 140px;gap:10px;padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;align-items:center}
.audit-row:hover{background:rgba(255,107,0,.03)}
/* ── Form validation ── */
.fc.fc-warn{border-color:var(--yw)!important}
.fc.fc-err{border-color:var(--rd)!important}
.f-warn-msg{font-size:11px;color:var(--yw);margin-top:4px;display:flex;align-items:center;gap:4px}
.f-err-msg{font-size:11px;color:var(--rd);margin-top:4px}
.f-ok-msg{font-size:11px;color:var(--gr);margin-top:4px}
/* sizes preview chips */
.size-chip{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.size-chip-ok {background:rgba(34,197,94,.12);color:var(--gr);border:1px solid rgba(34,197,94,.25)}
.size-chip-err{background:rgba(239,68,68,.12);color:var(--rd);border:1px solid rgba(239,68,68,.25)}
/* region chips in activities page */
.region-chip{background:var(--bg4);border:1px solid var(--bd);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.region-chip-dup{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
/* ── Finance section ── */
.fin-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.fin-kpi{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:18px 20px}
.fin-kpi-val{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px}
.fin-kpi-lbl{font-size:11px;color:var(--mu);font-weight:600}
.fin-kpi-sub{font-size:10px;color:var(--mu2);margin-top:3px}
.fin-kpi.accent{border-color:rgba(255,107,0,.3);background:rgba(255,107,0,.06)}
.fin-kpi.green {border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06)}
.fin-kpi.yellow{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06)}
.fin-kpi.red   {border-color:rgba(239,68,68,.3) ;background:rgba(239,68,68,.06) }
.chart-wrap{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:18px}
.chart-title{font-size:13px;font-weight:800;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--mu);margin-bottom:14px}
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px}
.expiry-row{display:grid;grid-template-columns:1fr 90px 70px 90px;gap:10px;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.expiry-row:hover{background:rgba(255,107,0,.03)}
.cron-status{background:var(--bg4);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:14px;font-size:12px}
@media(max-width:900px){.fin-kpi-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}}
/* ── Bookings section ── */
.bk-row{display:grid;grid-template-columns:130px 1fr 120px 90px 110px 110px;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.bk-row:hover{background:rgba(255,107,0,.03)}
.bk-row-hd{background:var(--bg4);color:var(--mu);font-size:11px;font-weight:800;border-radius:var(--r) var(--r) 0 0}
.b-bk-pending{background:rgba(245,158,11,.13);color:var(--yw);border:1px solid rgba(245,158,11,.3)}
.b-bk-viewing{background:rgba(99,102,241,.13);color:#818cf8;border:1px solid rgba(99,102,241,.3)}
.b-bk-confirmed{background:rgba(34,197,94,.13);color:var(--gr);border:1px solid rgba(34,197,94,.3)}
.b-bk-completed{background:rgba(107,107,138,.13);color:var(--mu);border:1px solid rgba(107,107,138,.28)}
.b-bk-cancelled{background:rgba(239,68,68,.13);color:var(--rd);border:1px solid rgba(239,68,68,.3)}
/* ── Bulk notif section ── */
.notif-target-btn{background:var(--bg4);border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .18s;font-size:12px;font-weight:700;color:var(--tx2);text-align:center}
.notif-target-btn:hover{border-color:var(--or);color:var(--or)}
.notif-target-btn.sel{background:var(--org);border-color:var(--bdo);color:var(--or)}
.notif-hist-row{display:grid;grid-template-columns:120px 80px 1fr 90px;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;align-items:center}
.notif-hist-row:hover{background:rgba(255,107,0,.03)}
/* ── Export section ── */
.export-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:22px;display:flex;flex-direction:column;gap:14px}
.export-card-title{font-size:15px;font-weight:800;margin-bottom:4px}
.export-col-list{display:flex;flex-wrap:wrap;gap:8px}
.export-col-item{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;background:var(--bg4);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;user-select:none}
.export-col-item input{accent-color:var(--or)}
.activity-row{display:grid;grid-template-columns:90px 1fr 90px 90px 130px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.activity-row:hover{background:rgba(255,107,0,.03)}
.activity-row-hd{background:var(--bg4);color:var(--mu);font-size:11px;font-weight:800;border-radius:var(--r) var(--r) 0 0}
.extra-imgs-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.extra-img-wrap{position:relative;width:90px;height:70px;border-radius:8px;overflow:hidden;flex-shrink:0}
.extra-img-wrap img{width:100%;height:100%;object-fit:cover}
.extra-img-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:9px;cursor:pointer;line-height:18px;text-align:center}

/* ── Unit rows in form ── */
.unit-form-row{background:var(--bg4);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.unit-form-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.unit-form-title{font-size:12px;font-weight:700;color:var(--or)}

/* ── Owner list card ── */
.owner-row{display:grid;grid-template-columns:40px 1fr 90px 130px 60px 90px 130px;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;transition:background .15s}
.owner-row:hover{background:rgba(255,107,0,.03)}
.owner-row-hd{background:var(--bg4);font-weight:700;color:var(--mu);font-size:11px;border-radius:var(--r) var(--r) 0 0}
.owner-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg5);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--or);overflow:hidden;flex-shrink:0}
.owner-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
/* owner detail expand */
.owner-detail-wrap{background:var(--bg2);border-bottom:1px solid rgba(255,107,0,.12);display:none}
.owner-detail-wrap.open{display:block}
.owner-detail-inner{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.od-box{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}
.od-box-title{font-size:10px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.od-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;gap:8px}
.od-row:last-child{border-bottom:none}
.od-key{color:var(--mu);flex-shrink:0}
.od-val{color:var(--tx);font-weight:600;text-align:left;word-break:break-word}

/* ── Recent list ── */
.recent-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.recent-item:last-child{border-bottom:none}
.recent-thumb{width:42px;height:34px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px}
.recent-thumb img{width:100%;height:100%;object-fit:cover}
.recent-info{flex:1;min-width:0}
.recent-name{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-meta{font-size:10px;color:var(--mu);margin-top:2px}

/* ── Overview split ── */
.ov-split{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.ov-box{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:18px}
.ov-box-title{font-size:13px;font-weight:800;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── Confirm ── */
#confirm-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
#confirm-modal.open{display:flex}
.confirm-box{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:28px;max-width:380px;width:94%;text-align:center}
.confirm-title{font-size:16px;font-weight:800;color:var(--tx);margin-bottom:8px}
.confirm-sub{font-size:12px;color:var(--mu);margin-bottom:20px}
.confirm-actions{display:flex;gap:10px;justify-content:center}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.5);animation:toastIn .3s ease;pointer-events:all}
.toast-s{background:rgba(34,197,94,.92);color:#fff}
.toast-e{background:rgba(239,68,68,.92);color:#fff}
.toast-i{background:rgba(96,165,250,.92);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}

/* ── Empty / loading ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--mu)}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--tx2)}

@media(max-width:900px){
  :root{--sb:0px}
  .sidebar{transform:translateX(100%)}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay{display:block}
  .sb-overlay.visible{display:block;z-index:99}
  .topbar-menu{display:block}
  .main-wrap{margin-right:0}
  .ov-split,.fg2,.fg3{grid-template-columns:1fr}
  .page{padding:14px}
  .owner-row{grid-template-columns:36px 1fr 90px 80px}
  .owner-row>*:nth-child(n+5){display:none}
  .owner-detail-inner{grid-template-columns:1fr}
  .topbar{padding:10px 14px}
  .sub-kpi-grid{grid-template-columns:repeat(2,1fr)}
}

/* ══ Subscription Management ══ */
.sub-kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:1100px){.sub-kpi-grid{grid-template-columns:repeat(3,1fr)}}
.sub-kpi-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 18px;transition:border-color .2s,transform .2s}
.sub-kpi-card:hover{border-color:var(--bdo);transform:translateY(-2px)}
.sub-kpi-ico{font-size:20px;margin-bottom:8px}
.sub-kpi-val{font-size:30px;font-weight:900;font-family:'IBM Plex Mono',monospace;line-height:1}
.sub-kpi-lbl{font-size:11px;font-weight:700;color:var(--mu);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.sub-kpi-sub{font-size:10px;color:var(--mu2);margin-top:2px}
.kv-starter .sub-kpi-val{color:var(--mu)}
.kv-growth  .sub-kpi-val{color:var(--tl)}
.kv-pro     .sub-kpi-val{color:var(--or)}
.kv-expiring .sub-kpi-val{color:var(--rd)}
.kv-total   .sub-kpi-val{color:var(--gr)}
.sub-table{width:100%;border-collapse:collapse;font-size:12px}
.sub-table th{background:var(--bg4);padding:10px 12px;text-align:right;font-weight:700;color:var(--mu);border-bottom:1px solid var(--bd);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.sub-table td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.sub-table tr:hover td{background:rgba(255,107,0,.03)}
.sub-table tr:last-child td{border-bottom:none}
/* Sub Modal */
.sub-modal-ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px}
.sub-modal-ov.open{display:flex}
.sub-modal-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);width:100%;max-width:500px;box-shadow:0 24px 80px rgba(0,0,0,.8);animation:mPopSub .22s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.sub-modal-box::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:linear-gradient(90deg,transparent,var(--or),transparent)}
@keyframes mPopSub{from{opacity:0;transform:scale(.92) translateY(-12px)}}
.sub-toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--bg3);border-radius:8px}
.sub-toggle-sw{position:relative;width:44px;height:24px;flex-shrink:0;cursor:pointer}
.sub-toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.sub-toggle-sl{position:absolute;cursor:pointer;inset:0;background:var(--mu2);border-radius:24px;transition:.2s}
.sub-toggle-sl::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;bottom:3px;right:3px;transition:.2s}
.sub-toggle-sw input:checked+.sub-toggle-sl{background:var(--or)}
.sub-toggle-sw input:checked+.sub-toggle-sl::before{transform:translateX(-20px)}
/* Sub Modal inner */
.sub-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
.sub-modal-header span{font-weight:700;font-size:15px}
.sub-modal-close{background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .15s}
.sub-modal-close:hover{color:var(--tx)}
.sub-modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.sub-modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--bd)}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-row label{font-size:12px;font-weight:700;color:var(--mu)}
.form-row input,.form-row select,.form-row textarea{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:9px 12px;color:var(--tx);font-size:13px;font-family:inherit;direction:rtl}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--or)}
/* Sub status badges */
.sub-status-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.sub-badge-active{background:rgba(34,197,94,.15);color:#4ade80}
.sub-badge-trial{background:rgba(96,165,250,.15);color:#60a5fa}
.sub-badge-cancelled{background:rgba(239,68,68,.12);color:#f87171}
.sub-badge-expired{background:rgba(156,163,175,.12);color:var(--mu)}
/* Sub renew badges */
.sub-renew-on{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(34,197,94,.12);color:#4ade80}
.sub-renew-off{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(156,163,175,.08);color:var(--mu)}
</style>

async function sbRpc(fn, params) {
  const res = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method:'POST', headers: await sbHeaders(), body:JSON.stringify(params)
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||e.hint||`HTTP ${res.status}`); }
  return res.json();
}

═══════════════════════════════ */
async function loadAll() {
  if (!adminHash) return;
  setPageLoading(currentPage);
  try {
    let ownerReqsErr = null;
    const [spaces, owners, activities, ownerReqs, announcements] = await Promise.all([
      sbRpc('admin_get_spaces'),
      sbRpc('admin_get_owners'),
      fetchActivities().catch(()=>[]),
      sbRpc('admin_get_upgrade_requests')
        .catch(e => { ownerReqsErr = e; return []; }),
      sbRpc('admin_get_announcements').catch(()=>[]),
    ]);
    allSpaces        = spaces        || [];
    allOwners        = owners        || [];
    allActivities    = activities    || [];
    allOwnerRequests = ownerReqs     || [];
    allAnnouncements = announcements || [];
    if (ownerReqsErr) console.error('[upgrade_requests]', ownerReqsErr.message);
    updatePendingBadge();
    const now = new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
    const sync = document.getElementById('sb-last-sync');
    if (sync) sync.textContent = 'آخر تحديث: ' + now;
    renderCurrentPage();
    if (!_gotoApplied) {
      _gotoApplied = true;
      const _goto = new URLSearchParams(location.search).get('goto');
      if (_goto) gp(_goto);
    }
  } catch(e) {
    setPageContent(currentPage, `<div class="empty-state"><div class="empty-ico">⚠️</div><div class="empty-title">${esc(e.message)}</div><button class="btn btn-neu" style="margin-top:12px" onclick="loadAll()">🔄 حاول تاني</button></div>`);
  }
}

function updatePendingBadge() {
  /* النشر فوري الآن — "قيد المراجعة" تعني مساحات لم يراجعها الأدمن بعد (reviewed_at فارغ) */
  const n = allSpaces.filter(s=>!s.reviewed_at).length;
  const b = document.getElementById('pending-badge');
  if (b) { b.textContent = n; b.style.display = n > 0 ? 'inline' : 'none'; }

  const nr = allOwnerRequests.filter(r=>r.status==='pending'||r.status==='contacted').length;
  const br = document.getElementById('oreq-badge');
  if (br) { br.textContent = nr; br.style.display = nr > 0 ? 'inline' : 'none'; }

  /* bookings badge updates when the bookings page is opened (renderBookings) */
}

async function fetchActivities() {
  const res = await fetch(`${SB_URL}/rest/v1/space_activities?select=id,emoji,name_ar,sort_order,is_active&order=sort_order.asc`, {headers:SB_HDR});
  if (!res.ok) throw new Error('فشل تحميل الأنشطة: HTTP ' + res.status);
  return res.json();
}

async function sbTable(method, table, body, query='') {
  const res = await fetch(`${SB_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {...(await sbHeaders()), Prefer:'return=representation'},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.message || e.hint || `HTTP ${res.status}`);
  }
  return method === 'DELETE' ? null : res.json();
}

/* ═══════════════════════════════

═══════════════════════════════ */
function gp(page, el) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg = document.getElementById('pg-' + page);
  if (pg) pg.classList.add('active');
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    const sbi = document.getElementById('sbi-' + page);
    if (sbi) sbi.classList.add('active');
  }
  const ttl = document.getElementById('topbar-title');
  if (ttl) ttl.textContent = PAGE_TITLES[page] || page;
  if (window.innerWidth <= 900) closeSidebar();
  renderCurrentPage();
}

function renderCurrentPage() {
  switch(currentPage) {
    case 'overview':       renderOverview();       break;
    case 'spaces':         renderSpaces();         break;
    case 'pending':        renderPending();        break;
    case 'owners':         renderOwners();         break;
    case 'owner-requests': renderOwnerRequests();  break;
    case 'subscriptions':  renderSubscriptions();  break;
    case 'activities':     renderActivities();     break;
    case 'finance':        renderFinance();        break;
    case 'bookings':       renderBookings();       break;
    case 'notif':          renderBulkNotif();      break;
    case 'export':         renderExport();         break;
    case 'maintenance':    renderMaintenance();    break;
    case 'form':          /* rendered by editSpace/openAddForm */ break;
    case 'announcements': renderAnnouncements();                break;
    case 'ann-form':      /* rendered by openAnnForm */        break;
  }
}

function setPageLoading(page) {
  const el = document.getElementById('pg-' + page);
  if (el) el.innerHTML = loading();
}
function setPageContent(page, html) {
  const el = document.getElementById('pg-' + page);
  if (el) el.innerHTML = html;
}

function sc(ico, lbl, val, color) {
  return `<div class="stat-card"><div class="stat-card-ico" style="color:${color}">${ico}</div><div class="stat-card-val" style="color:${color}">${val}</div><div class="stat-card-lbl">${lbl}</div></div>`;

function ownerDistChart(pro, growth, starter, active, dormant) {
  const total = pro + growth + starter || 1;
  const rows = [
    {lbl:'🏆 Pro',    val:pro,     color:'var(--yw)',  pct:Math.round(pro/total*100)},
    {lbl:'✓ Growth', val:growth,  color:'var(--tl)',  pct:Math.round(growth/total*100)},
    {lbl:'Starter',  val:starter, color:'var(--mu)',  pct:Math.round(starter/total*100)},
    {lbl:'🟢 نشط',   val:active,  color:'var(--gr)',  pct:Math.round(active/Math.max(1,active+dormant)*100)},
    {lbl:'🔴 خامل',  val:dormant, color:'var(--rd)',  pct:Math.round(dormant/Math.max(1,active+dormant)*100)},
  ];
  return rows.map(r=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="width:52px;font-size:11px;color:var(--tx2);flex-shrink:0">${r.lbl}</div>
      <div style="flex:1;background:var(--bg4);border-radius:20px;height:7px;overflow:hidden">
        <div style="width:${r.pct}%;height:100%;background:${r.color};border-radius:20px;transition:width .6s"></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:${r.color};width:24px;text-align:left;font-family:'IBM Plex Mono',monospace">${r.val}</div>
    </div>`).join('');
}

  if (spacesSortCol === col) spacesSortDir = -spacesSortDir;
  else { spacesSortCol = col; spacesSortDir = 1; }
  renderSpaces();
}
function toggleSpaceSelect(id, checked) {
  checked ? selectedSpaceIds.add(id) : selectedSpaceIds.delete(id);
  /* update checkboxes without full re-render */
  const allChk = document.getElementById('sp-chk-all');
  if (allChk) {
    const rows = [...document.querySelectorAll('.sp-chk')];
    allChk.checked = rows.length > 0 && rows.every(c=>c.checked);
    allChk.indeterminate = !allChk.checked && rows.some(c=>c.checked);

  const bulkEl = document.getElementById('bulk-action-bar');
  if (bulkEl) bulkEl.style.display = selectedSpaceIds.size > 0 ? 'flex' : 'none';
  const cntEl = document.getElementById('bulk-count');
  if (cntEl) cntEl.textContent = selectedSpaceIds.size + ' محددة';

function renderSpaces() {
  let filtered = [...allSpaces];
  if (fltStatus) filtered = filtered.filter(s=>s.status===fltStatus);
  if (fltType)   filtered = filtered.filter(s=>s.type===fltType);
  if (fltSearch) {
    const q = fltSearch.toLowerCase();
    filtered = filtered.filter(s=>
      (s.name||'').toLowerCase().includes(q)||
      (s.region||'').toLowerCase().includes(q)||
      (s.owner_name||'').toLowerCase().includes(q)
    );
  }

  /* sort */
  if (spacesSortCol) {
    filtered.sort((a,b)=>{
      let va = a[spacesSortCol] ?? '', vb = b[spacesSortCol] ?? '';
      if (typeof va === 'string') { va = va.toLowerCase(); vb = String(vb).toLowerCase(); }
      if (va < vb) return -spacesSortDir;
      if (va > vb) return spacesSortDir;
      return 0;
    });
  }

  const live     = allSpaces.filter(s=>s.status==='live').length;
  const paused   = allSpaces.filter(s=>s.status==='paused').length;
  const hidden   = allSpaces.filter(s=>s.status==='hidden_by_admin').length;
  const archived = allSpaces.filter(s=>s.status==='archived').length;

  /* pagination */
  const totalPages = Math.max(1, Math.ceil(filtered.length / SPACES_PAGE_SIZE));
  if (spacesPage > totalPages) spacesPage = totalPages;
  if (spacesPage < 1) spacesPage = 1;
  const pageStart = (spacesPage - 1) * SPACES_PAGE_SIZE;
  const pageItems = filtered.slice(pageStart, pageStart + SPACES_PAGE_SIZE);
  const allPageSel = pageItems.length > 0 && pageItems.every(s => selectedSpaceIds.has(s.id));

  function thSort(col, label, extraStyle='') {
    const isActive = spacesSortCol === col;
    const cls = isActive ? (spacesSortDir===1 ? 'sort-asc' : 'sort-desc') : '';
    return `<th class="sortable ${cls}" style="${extraStyle}" onclick="setSpacesSort('${col}')">${label}</th>`;
  }

  let html = `
  <div class="stats-bar">
    <div class="stat-chip"><span class="stat-num">${allSpaces.length}</span> إجمالي</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--gr)">${live}</span> منشورة</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--yw)">${paused}</span> موقوفة</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--rd)">${hidden}</span> مخفية</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--mu)">${archived}</span> مؤرشفة</div>
  </div>
  <div class="filter-bar">
    <input class="f-inp" placeholder="🔍 بحث…" value="${esc(fltSearch)}"
           oninput="fltSearch=this.value;spacesPage=1;renderSpaces()" style="min-width:200px">
    <select class="f-sel" onchange="fltStatus=this.value;spacesPage=1;renderSpaces()">
      <option value="" ${!fltStatus?'selected':''}>جميع الحالات</option>
      <option value="live"            ${fltStatus==='live'?'selected':''}>✅ منشورة</option>
      <option value="paused"          ${fltStatus==='paused' ?'selected':''}>⏸ موقوفة</option>
      <option value="hidden_by_admin" ${fltStatus==='hidden_by_admin'?'selected':''}>🚫 مخفية</option>
      <option value="archived"        ${fltStatus==='archived'?'selected':''}>🗄 مؤرشفة</option>
    </select>
    <select class="f-sel" onchange="fltType=this.value;spacesPage=1;renderSpaces()">
      <option value="" ${!fltType?'selected':''}>جميع الأنواع</option>
      <option value="mall"   ${fltType==='mall'  ?'selected':''}>🏬 مول</option>
      <option value="club"   ${fltType==='club'  ?'selected':''}>⚽ نادي</option>
      <option value="school" ${fltType==='school'?'selected':''}>🏫 مدرسة</option>
      <option value="hotel"  ${fltType==='hotel' ?'selected':''}>🏨 فندق</option>
      <option value="other"  ${fltType==='other' ?'selected':''}>🏪 أخرى</option>
    </select>
    <button class="btn btn-neu" onclick="fltStatus='';fltType='';fltSearch='';spacesPage=1;renderSpaces()">× مسح</button>
    <div style="margin-right:auto;font-size:12px;color:var(--mu)">${filtered.length} نتيجة</div>
  </div>

  <div class="bulk-bar" id="bulk-action-bar" style="display:${selectedSpaceIds.size>0?'flex':'none'}">
    <span id="bulk-count">${selectedSpaceIds.size} محددة</span>
    <button class="btn" onclick="bulkReview()">👁 وضع علامة مُراجَع</button>
    <button class="btn" style="background:rgba(239,68,68,.35)" onclick="bulkDelete()">🗑 حذف</button>
    <button class="btn" style="margin-right:auto" onclick="selectedSpaceIds.clear();renderSpaces()">× إلغاء التحديد</button>
  </div>`;

  if (!pageItems.length) {
    html += `<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-title">لا توجد نتائج</div></div>`;
    setPageContent('spaces', html); return;
  }

  html += `<div class="t-wrap"><table class="t"><thead><tr>
    <th style="width:32px;padding:10px 8px"><input type="checkbox" id="sp-chk-all" ${allPageSel?'checked':''} onchange="togglePageSelect(this.checked)"></th>
    <th style="width:24px"></th>
    ${thSort('name','المساحة')}
    ${thSort('type','النوع')}
    ${thSort('region','المنطقة')}
    ${thSort('units_count','وحدات','text-align:center')}
    ${thSort('status','الحالة')}
    <th>المراجعة</th>
    ${thSort('owner_plan','الباقة')}
    <th>الصاحب</th>
    <th>الإجراءات</th>
  </tr></thead><tbody>`;

  pageItems.forEach(s => {
    const stCls = statusCls(s.status);
    const acLbl = s.reviewed_at
      ? '<span class="badge b-active">✓ مُراجَع</span>'
      : '<span class="badge b-pending">⏳ جديدة</span>';
    const isChecked = selectedSpaceIds.has(s.id) ? 'checked' : '';
    html += `
    <tr class="sp-row" id="srow-${s.id}" onclick="toggleSpaceRow('${s.id}')">
      <td onclick="event.stopPropagation()" style="padding:10px 8px">
        <input type="checkbox" class="sp-chk" data-id="${s.id}" ${isChecked}
               onchange="toggleSpaceSelect('${s.id}',this.checked)">
      </td>
      <td><span class="exp-ico" id="exp-${s.id}">▶</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          ${s.image_url
            ? `<img src="${s.image_url.replace('_f.webp','_c.webp')}" style="width:36px;height:28px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'">`
            : `<div style="width:36px;height:28px;background:var(--bg5);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px">${esc(s.icon_emoji||'🏪')}</div>`}
          <span style="font-weight:700;font-size:12px">${esc(s.name)}</span>
        </div>
      </td>
      <td>${typeLabel(s.type)}</td>
      <td style="font-size:11px;color:var(--tx2)">${esc(s.region||'—')}</td>
      <td style="text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:700">${s.units_count||0}</td>
      <td><span class="badge ${stCls}">${statusLbl(s.status)}</span></td>
      <td>${acLbl}</td>
      <td><span class="badge ${planCls(s.owner_plan)}">${planLbl(s.owner_plan)}</span></td>
      <td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${s.is_broker
          ? `<span style="color:#60a5fa;font-weight:700">🏛️ بروكر</span>`
          : `<span style="color:var(--mu)">${esc(s.owner_name||'—')}</span>`}
      </td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${!s.reviewed_at?`<button class="btn btn-ok" title="وضع علامة مُراجَع" onclick="doReview('${s.id}')">👁</button>`:''}
          ${s.status==='live'||s.status==='paused'
            ?`<button class="btn btn-err" title="إخفاء (مخالفة)" onclick="promptHide('${s.id}','${esc(s.name)}')">🚫</button>`
            :s.status==='hidden_by_admin'
            ?`<button class="btn btn-ok" title="إعادة النشر" onclick="doUnhide('${s.id}')">↩️</button>`
            :s.status==='archived'
            ?`<button class="btn btn-ok" title="إعادة التفعيل من الأرشيف" onclick="doUnarchive('${s.id}')">↩️</button>`
            :''}
          ${s.status==='live'?`<button class="btn btn-neu" title="أرشفة" onclick="doArchive('${s.id}')">🗄</button>`:''}
          <button class="btn btn-yw"  onclick="editSpace('${s.id}')">✏️</button>
          <button class="btn btn-err" onclick="promptDelete('${s.id}','${esc(s.name)}')">🗑</button>
        </div>
      </td>
    </tr>
    <tr id="detail-row-${s.id}" style="display:none"><td colspan="11" style="padding:0">
      <div id="detail-panel-${s.id}" class="detail-panel"></div>
    </td></tr>`;
  });

  html += `</tbody></table></div>`;

  if (totalPages > 1) {
    html += `<div class="pg-bar">
      <button class="btn btn-neu" ${spacesPage<=1?'disabled':''} onclick="spacesPage--;renderSpaces()">‹ السابق</button>
      <span style="color:var(--mu);font-family:'IBM Plex Mono',monospace;font-size:13px">${spacesPage} / ${totalPages}</span>
      <span style="font-size:11px;color:var(--mu)">(${filtered.length} نتيجة)</span>
      <button class="btn btn-neu" ${spacesPage>=totalPages?'disabled':''} onclick="spacesPage++;renderSpaces()">التالي ›</button>
    </div>`;
  }

  setPageContent('spaces', html);
}

async function toggleSpaceRow(id) {
  const row   = document.getElementById('detail-row-' + id);
  const panel = document.getElementById('detail-panel-' + id);
  const icon  = document.getElementById('exp-' + id);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  row.style.display = isOpen ? 'none' : 'table-row';
  if (icon) icon.classList.toggle('open', !isOpen);
  if (!isOpen && panel && !panel.dataset.loaded) {
    panel.innerHTML = `<div style="padding:14px;color:var(--mu);font-size:12px"><span class="spin">⏳</span> جاري التحميل…</div>`;
    try {
      const d = await loadSpaceDetail(id);
      panel.innerHTML = buildDetailHtml(d.space, d.units, d.owner);
      panel.dataset.loaded = '1';
    } catch(e) {
      panel.innerHTML = `<div style="padding:12px;color:var(--rd);font-size:12px">⚠️ ${esc(e.message)}</div>`;
    }
  }
}

function buildDetailHtml(sp, units, owner) {
  if (!sp) return '<div style="padding:12px;color:var(--mu)">لا بيانات</div>';
  const imgs = (sp.extra_images||[]).filter(Boolean);
  return `<div style="padding:16px">
    <div class="detail-grid">
      ${df('الوصف',         sp.description)}
      ${df('الأحجام/الأسعار', sp.sizes_prices)}
      ${df('أدنى سعر',      sp.min_price ? sp.min_price.toLocaleString('ar-EG')+' ج' : '—')}
      ${df('الأنشطة',       (sp.activities||[]).join(' · ')||'—')}
      ${df('الموسم',        sp.season)}
      ${df('ملاحظة',        sp.insight)}
      ${df('المرافق',       (sp.amenities||[]).join(' · ')||'—')}
      ${df('الترتيب',       sp.sort_order)}
      ${df('تاريخ الإضافة', fmtDate(sp.created_at))}
      ${df('آخر تحديث',    fmtDate(sp.updated_at))}
      ${owner?.email ? df('الصاحب', esc(owner.full_name||'—')+' — '+esc(owner.email)) : ''}
    </div>
    ${sp.reject_reason?`<div style="margin-bottom:10px;padding:8px 12px;background:rgba(239,68,68,.1);border-radius:8px;font-size:11px;color:var(--rd)">سبب الرفض: ${esc(sp.reject_reason)}</div>`:''}
    ${imgs.length?`<div class="detail-imgs">${imgs.map(u=>`<img src="${u}" class="detail-img" onerror="this.style.display='none'">`).join('')}</div>`:''}
    ${units&&units.length?`
      <div style="margin-top:12px;font-size:12px;font-weight:700;color:var(--or);margin-bottom:6px">📦 الوحدات الفرعية (${units.length})</div>
      <table class="ut">
        <thead><tr><th>كود</th><th>الاسم</th><th>الدور</th><th>المساحة</th><th>السعر</th><th>الحالة</th><th>الموقع</th><th></th></tr></thead>
        <tbody>${units.map(u=>`
          <tr>
            <td style="font-family:'IBM Plex Mono',monospace;color:var(--or)">${esc(u.unit_id)}</td>
            <td>${esc(u.name||'—')}</td>
            <td>${esc(u.floor||'—')}</td>
            <td>${esc(u.size||'—')}</td>
            <td style="font-family:'IBM Plex Mono',monospace">${u.price?u.price.toLocaleString('ar-EG')+' ج':'—'}</td>
            <td>
              <select onchange="changeUnitStatus('${u.id}','${sp.id}',this.value,this)"
                      style="background:var(--bg4);color:var(--tx);border:1px solid var(--mu2);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer">
                <option value="available"   ${u.status==='available'  ?'selected':''}>✅ متاحة</option>
                <option value="rented"      ${u.status==='rented'     ?'selected':''}>🔴 مؤجّرة</option>
                <option value="reserved"    ${u.status==='reserved'   ?'selected':''}>⏳ محجوزة</option>
                <option value="maintenance" ${u.status==='maintenance'?'selected':''}>🔧 صيانة</option>
              </select>
            </td>
            <td style="font-size:10px;color:var(--mu)">${esc(u.location||'—')}</td>
            <td><button class="btn btn-err" style="font-size:10px;padding:3px 7px" onclick="doDeleteUnit('${u.id}','${sp.id}')">🗑</button></td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<div style="color:var(--mu);font-size:11px;margin-top:8px">لا توجد وحدات فرعية</div>'}
  </div>`;
}
function df(k, v) {
  return `<div class="detail-field"><div class="detail-key">${k}</div><div class="detail-val">${esc(String(v||'—'))}</div></div>`;
}

/* ═══════════════════════════════
   PAGE: PENDING
═══════════════════════════════ */
function renderPending() {
  /* النشر فوري — هذه الصفحة تعرض المساحات المنشورة التي لم يراجعها الأدمن بعد */
  const pending = allSpaces.filter(s=>!s.reviewed_at);
  const live    = allSpaces.filter(s=>s.status==='live').length;

  let html = `<div class="stats-bar">
    <div class="stat-chip"><span class="stat-num" style="color:var(--yw)">${pending.length}</span> غير مُراجَعة</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--gr)">${live}</span> منشورة</div>
    <div class="stat-chip"><span class="stat-num">${allSpaces.length}</span> إجمالي</div>
  </div>`;

  if (!pending.length) {
    html += `<div class="empty-state"><div class="empty-ico">✅</div><div class="empty-title">لا توجد مساحات تنتظر المراجعة</div><div>جميع المساحات تمت مراجعتها</div></div>`;
    setPageContent('pending', html); return;
  }

  html += pending.map(s=>{
    const daysWaiting = s.created_at ? Math.floor((Date.now()-new Date(s.created_at))/(1000*86400)) : 0;
    const slaBadge = daysWaiting >= 7
      ? `<span class="sla-late">⚠ منذ ${daysWaiting} يوم</span>`
      : daysWaiting >= 3
        ? `<span class="sla-warn">⏰ منذ ${daysWaiting} يوم</span>`
        : `<span class="sla-ok">منذ ${daysWaiting} يوم</span>`;
    return `
  <div class="p-card" id="pcard-${s.id}">
    <div class="p-thumb">${s.image_url?`<img src="${s.image_url}" onerror="this.parentElement.innerHTML='🏪'">`:'🏪'}</div>
    <div class="p-info">
      <div class="p-name" style="display:flex;align-items:center;gap:8px">${esc(s.name)} ${slaBadge}</div>
      <div class="p-meta">
        📍 <b>${esc(s.region||'—')}</b> &nbsp;·&nbsp;
        ${typeLabel(s.type)} &nbsp;·&nbsp;
        ${s.is_broker
          ? `🏛️ <b style="color:#60a5fa">مكاني سبوت — بروكر</b>`
          : `👤 <b>${esc(s.owner_name||'—')}</b> (${esc(s.owner_email||s.owner_name||'—')})`} &nbsp;·&nbsp;
        📦 ${s.units_count||0} وحدة &nbsp;·&nbsp;
        🏷 <span class="badge ${s.is_broker?'b-broker':planCls(s.owner_plan)}">${s.is_broker?'بروكر':planLbl(s.owner_plan)}</span> &nbsp;·&nbsp;
        🕐 ${fmtDate(s.created_at)}
      </div>
      <div class="p-actions">
        <button class="btn btn-ok"  onclick="doReview('${s.id}')">👁 مُراجَع</button>
        <button class="btn btn-err" onclick="toggleRejectRow('${s.id}')">🚫 إخفاء</button>
        <button class="btn btn-bl"  onclick="togglePendingDetail('${s.id}')">🔍 معاينة</button>
        <button class="btn btn-yw"  onclick="editSpace('${s.id}')">✏️ تعديل</button>
      </div>
      <div id="rrow-${s.id}" style="display:none;margin-top:8px;display:none;gap:8px;align-items:center">
        <input id="rreason-${s.id}" style="flex:1;background:var(--bg4);border:1.5px solid var(--mu2);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--tx);outline:none" placeholder="سبب الإخفاء (اختياري)…" type="text">
        <button class="btn btn-err" onclick="doHide('${s.id}')">تأكيد الإخفاء</button>
      </div>
      <div id="pdetail-${s.id}" style="display:none;margin-top:10px;border-top:1px solid var(--bd);padding-top:10px"></div>
    </div>
  </div>`;
  }).join('');

  setPageContent('pending', html);
}

function toggleRejectRow(id) {
  const r = document.getElementById('rrow-' + id);
  if (r) r.style.display = (r.style.display === 'none' || r.style.display === '') ? 'flex' : 'none';
}

async function togglePendingDetail(id) {
  const el = document.getElementById('pdetail-' + id);
  if (!el) return;
  const show = el.style.display === 'none' || el.style.display === '';
  el.style.display = show ? 'block' : 'none';
  if (show && !el.dataset.loaded) {
    el.innerHTML = `<span class="spin">⏳</span> جاري التحميل…`;
    try {
      const d = await loadSpaceDetail(id);
      el.innerHTML = buildDetailHtml(d.space, d.units, d.owner);
      el.dataset.loaded = '1';
    } catch(e) {
      el.innerHTML = `<span style="color:var(--rd)">⚠️ ${esc(e.message)}</span>`;
    }
  }
}

/* ═══════════════════════════════
   PAGE: OWNERS
═══════════════════════════════ */
function renderOwners() {
  const ownerSpaceCount = {};
  const ownerApprovedCount = {};
  allSpaces.forEach(s => {
    if (s.owner_id) {
      ownerSpaceCount[s.owner_id] = (ownerSpaceCount[s.owner_id]||0) + 1;
      if (s.status==='live') ownerApprovedCount[s.owner_id] = (ownerApprovedCount[s.owner_id]||0) + 1;
    }
  });

  const total     = allOwners.length;
  const suspended = allOwners.filter(o=>o.is_suspended).length;
  const active    = allOwners.filter(o=>!o.is_suspended && (ownerApprovedCount[o.id]||0)>0).length;
  const pro       = allOwners.filter(o=>o.plan_tier==='pro').length;
  const growth    = allOwners.filter(o=>o.plan_tier==='growth').length;

  let filtered = [...allOwners];
  if (ownerSearch) {
    const q = ownerSearch.toLowerCase();
    filtered = filtered.filter(o=>
      (o.full_name||o.name||'').toLowerCase().includes(q)||
      (o.email||'').toLowerCase().includes(q)||
      (o.phone||'').includes(q)
    );
  }

  function subBadgeHtml(o) {
    if (!o.sub_status || o.sub_status === 'none') return `<span class="badge b-sub-none">بدون اشتراك</span>`;
    if (o.sub_status === 'active') {
      if (o.sub_ends) {
        const dl = Math.ceil((new Date(o.sub_ends) - Date.now())/(1000*86400));
        if (dl < 0)   return `<span class="badge b-sub-exp">منتهي</span>`;
        if (dl <= 30) return `<span class="badge b-sub-warn">⚠ ${dl}د</span>`;
        return `<span class="badge b-sub-ok">✓ ${fmtDate(o.sub_ends)}</span>`;
      }
      return `<span class="badge b-sub-ok">✓ نشط</span>`;
    }
    if (o.sub_status === 'expired') return `<span class="badge b-sub-exp">منتهي</span>`;
    return `<span class="badge b-sub-none">${esc(o.sub_status)}</span>`;
  }

  function statusBadgeHtml(o) {
    if (o.is_suspended) return `<span class="badge b-suspended">🚫 موقوف</span>`;
    return (ownerApprovedCount[o.id]||0) > 0
      ? `<span class="badge b-ok">🟢 نشط</span>`
      : `<span class="badge b-dormant">🔴 خامل</span>`;
  }

  let html = `
  <div class="stats-bar">
    <div class="stat-chip"><span class="stat-num">${total}</span> إجمالي</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--gr)">${active}</span> نشط</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--rd)">${suspended}</span> موقوف</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--yw)">${pro}</span> Pro</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--tl)">${growth}</span> Growth</div>
  </div>
  <div class="filter-bar">
    <input class="f-inp" placeholder="🔍 بحث بالاسم أو الإيميل أو الهاتف…" value="${esc(ownerSearch)}"
           oninput="ownerSearch=this.value;renderOwners()" style="min-width:220px">
    <button class="btn btn-bl" onclick="promptPromoteOwner()" style="font-size:11px;padding:6px 14px">👤+ ترقية مستخدم</button>
    <div style="margin-right:auto;font-size:12px;color:var(--mu)">${filtered.length} صاحب</div>
  </div>`;

  if (!filtered.length) {
    html += `<div class="empty-state"><div class="empty-ico">👥</div><div class="empty-title">لا توجد نتائج</div></div>`;
    setPageContent('owners', html); return;
  }

  html += `<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden">
    <div class="owner-row owner-row-hd">
      <div></div>
      <div>الصاحب</div>
      <div>الباقة</div>
      <div>الاشتراك</div>
      <div style="text-align:center">مساحات</div>
      <div>الحالة</div>
      <div>إجراءات</div>
    </div>
    ${filtered.map(o => {
      const name     = o.full_name || o.name || '—';
      const initials = name.trim().split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '?';
      const avatarHtml = o.avatar_url
        ? `<div class="owner-avatar"><img src="${esc(o.avatar_url)}" alt="${esc(initials)}"></div>`
        : `<div class="owner-avatar">${esc(initials)}</div>`;
      const spCount = ownerSpaceCount[o.id] || 0;
      const apCount = ownerApprovedCount[o.id] || 0;
      return `
      <div class="owner-row" id="orow-${esc(o.id)}">
        ${avatarHtml}
        <div>
          <div style="font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(name)}</div>
          <div style="font-size:10px;color:var(--mu);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.email||'—')}</div>
        </div>
        <div><span class="badge ${planCls(o.plan_tier)}">${planLbl(o.plan_tier)}</span></div>
        <div>${subBadgeHtml(o)}</div>
        <div style="text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:700">
          <span style="color:var(--tx)">${spCount}</span><span style="color:var(--mu);font-size:10px">/</span><span style="color:var(--gr)">${apCount}</span>
        </div>
        <div>${statusBadgeHtml(o)}</div>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-neu" style="font-size:10px;padding:4px 8px" title="تفاصيل" onclick="toggleOwnerDetail('${esc(o.id)}')">📋</button>
          <button class="btn btn-yw" style="font-size:10px;padding:4px 8px" title="تغيير الباقة" onclick="promptChangePlan('${esc(o.id)}','${esc(o.plan_tier||'starter')}','${esc(name)}')">💳</button>
          ${o.is_suspended
            ? `<button class="btn btn-ok" style="font-size:10px;padding:4px 8px" onclick="unsuspendOwner('${esc(o.id)}','${esc(name)}')">✓ رفع</button>`
            : `<button class="btn btn-err" style="font-size:10px;padding:4px 8px" title="إيقاف الحساب" onclick="suspendOwner('${esc(o.id)}','${esc(name)}')">🚫</button>`
          }
        </div>
      </div>
      <div class="owner-detail-wrap" id="odetail-${esc(o.id)}">
        <div class="owner-detail-inner">${buildOwnerDetailHtml(o, ownerSpaceCount, ownerApprovedCount)}</div>
      </div>`;
    }).join('')}
  </div>`;

  setPageContent('owners', html);
}

function toggleOwnerDetail(id) {
  const el = document.getElementById('odetail-' + id);
  if (el) el.classList.toggle('open');
}

function buildOwnerDetailHtml(o, spaceCount, approvedCount) {
  const ownerSpaces = allSpaces.filter(s => s.owner_id === o.id);

  let subStatus = '—', subStatusCls = 'b-sub-none';
  if (o.sub_status === 'active') {
    if (o.sub_ends) {
      const dl = Math.ceil((new Date(o.sub_ends) - Date.now())/(1000*86400));
      if (dl < 0)        { subStatus = 'منتهي';              subStatusCls = 'b-sub-exp';  }
      else if (dl <= 30) { subStatus = `ينتهي خلال ${dl} يوم`; subStatusCls = 'b-sub-warn'; }
      else               { subStatus = 'نشط';                 subStatusCls = 'b-sub-ok';   }
    } else { subStatus = 'نشط (بلا تاريخ)'; subStatusCls = 'b-sub-ok'; }
  } else if (o.sub_status === 'expired') { subStatus = 'منتهي'; subStatusCls = 'b-sub-exp'; }
  else if (o.sub_status && o.sub_status !== 'none') { subStatus = esc(o.sub_status); }

  const phone  = o.phone ? o.phone.replace(/\D/g,'') : null;
  const waLink = phone ? `https://wa.me/${phone}` : null;

  const contactBox = `<div class="od-box">
    <div class="od-box-title">📞 التواصل</div>
    <div class="od-row"><span class="od-key">الإيميل</span><span class="od-val" style="font-size:10px">${esc(o.email||'—')}</span></div>
    <div class="od-row"><span class="od-key">الهاتف</span><span class="od-val">${esc(o.phone||'—')}</span></div>
    <div class="od-row"><span class="od-key">انضم</span><span class="od-val">${fmtDate(o.created_at)}</span></div>
    ${waLink ? `<a href="${esc(waLink)}" target="_blank" rel="noopener" class="btn btn-ok" style="display:inline-block;margin-top:8px;text-decoration:none;font-size:11px;padding:5px 14px">💬 واتساب</a>` : ''}
  </div>`;

  const subBox = `<div class="od-box">
    <div class="od-box-title">💳 الاشتراك</div>
    <div class="od-row"><span class="od-key">الباقة</span><span class="od-val"><span class="badge ${planCls(o.plan_tier)}">${planLbl(o.plan_tier)}</span></span></div>
    <div class="od-row"><span class="od-key">الحالة</span><span class="od-val"><span class="badge ${subStatusCls}">${subStatus}</span></span></div>
    <div class="od-row"><span class="od-key">تنتهي</span><span class="od-val">${fmtDate(o.sub_ends)}</span></div>
    <div class="od-row"><span class="od-key">تجديد تلقائي</span><span class="od-val">${o.auto_renew ? '✅ نعم' : '❌ لا'}</span></div>
    ${o.sub_notes ? `<div class="od-row"><span class="od-key">ملاحظات</span><span class="od-val" style="font-size:10px">${esc(o.sub_notes)}</span></div>` : ''}
  </div>`;

  const spacesBox = `<div class="od-box">
    <div class="od-box-title">🏢 المساحات (${ownerSpaces.length})</div>
    ${ownerSpaces.length === 0
      ? `<div style="color:var(--mu);font-size:11px">لا توجد مساحات مسجّلة</div>`
      : ownerSpaces.slice(0,6).map(s=>`
        <div class="od-row">
          <span class="od-key" style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.name||'—')}</span>
          <span class="od-val"><span class="badge ${statusCls(s.status)}" style="font-size:9px">${statusLbl(s.status)}</span></span>
        </div>`).join('') +
        (ownerSpaces.length > 6 ? `<div style="color:var(--mu);font-size:10px;margin-top:6px">+${ownerSpaces.length-6} أخرى</div>` : '')
    }
  </div>`;

  return contactBox + subBox + spacesBox;
}

function promptChangePlan(ownerId, currentPlan, ownerName) {
  const existing = document.getElementById('plan-change-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'plan-change-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:28px;max-width:420px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.7)">
      <div style="font-size:15px;font-weight:800;color:var(--tx);margin-bottom:4px">💳 تغيير الباقة</div>
      <div style="font-size:12px;color:var(--mu);margin-bottom:20px">${esc(ownerName)}</div>
      <div class="fg" style="margin-bottom:12px">
        <label class="fl">الباقة</label>
        <select id="pcm-plan" class="fc">
          <option value="starter" ${currentPlan==='starter'?'selected':''}>Starter</option>
          <option value="growth"  ${currentPlan==='growth' ?'selected':''}>Growth</option>
          <option value="pro"     ${currentPlan==='pro'    ?'selected':''}>Pro</option>
        </select>
      </div>
      <div class="fg" style="margin-bottom:12px">
        <label class="fl">تاريخ انتهاء الاشتراك (اختياري)</label>
        <input id="pcm-ends" class="fc" type="date">
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label class="fl">ملاحظات (اختياري)</label>
        <textarea id="pcm-notes" class="fc" rows="2" placeholder="سبب التغيير أو أي ملاحظة…"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-neu" onclick="document.getElementById('plan-change-modal').remove()">إلغاء</button>
        <button class="btn btn-or" id="pcm-ok">✅ تأكيد التغيير</button>
      </div>
    </div>`;

  document.body.appendChild(modal);

  document.getElementById('pcm-ok').onclick = async () => {
    const newPlan = document.getElementById('pcm-plan').value;
    const endsAt  = document.getElementById('pcm-ends').value || null;
    const notes   = document.getElementById('pcm-notes').value.trim() || null;
    const btn     = document.getElementById('pcm-ok');
    btn.disabled  = true; btn.textContent = '⏳…';
    try {
      await sbRpc('admin_set_plan_tier', {
        p_owner_id: ownerId, p_plan_tier: newPlan,
        p_ends_at: endsAt, p_notes: notes
      });
      const o = allOwners.find(x=>x.id===ownerId);
      if (o) { o.plan_tier = newPlan; if (endsAt) o.sub_ends = endsAt; o.sub_status = 'active'; if (notes) o.sub_notes = notes; }
      modal.remove();
      toast(`✅ تم تغيير الباقة إلى ${planLbl(newPlan)}`, 's');
      renderOwners();
    } catch(e) {
      btn.disabled = false; btn.textContent = '✅ تأكيد التغيير';
      toast('خطأ: ' + e.message, 'e');
    }
  };

  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

async function suspendOwner(id, name) {
  showConfirm(
    `🚫 إيقاف الحساب`,
    `هل تريد إيقاف حساب "${name}"؟ لن يتمكن من تسجيل الدخول.`,
    async () => {
      try {
        await sbRpc('admin_toggle_owner_suspend', {p_owner_id: id, p_suspend: true});
        const o = allOwners.find(x=>x.id===id);
        if (o) o.is_suspended = true;
        toast(`🚫 تم إيقاف حساب "${name}"`, 'i');
        renderOwners();
      } catch(e) { toast('خطأ: ' + e.message, 'e'); }
    }
  );
}

async function unsuspendOwner(id, name) {
  showConfirm(
    `✅ رفع الإيقاف`,
    `هل تريد رفع الإيقاف عن حساب "${name}"؟`,
    async () => {
      try {
        await sbRpc('admin_toggle_owner_suspend', {p_owner_id: id, p_suspend: false});
        const o = allOwners.find(x=>x.id===id);
        if (o) o.is_suspended = false;
        toast(`✅ تم رفع الإيقاف عن "${name}"`, 's');
        renderOwners();
      } catch(e) { toast('خطأ: ' + e.message, 'e'); }
    }
  );
}

function promptPromoteOwner() {
  const existing = document.getElementById('promote-owner-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'promote-owner-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:28px;max-width:400px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.7)">
      <div style="font-size:15px;font-weight:800;color:var(--tx);margin-bottom:4px">👤 ترقية مستخدم إلى صاحب مساحة</div>
      <div style="font-size:12px;color:var(--mu);margin-bottom:20px">أدخل إيميل المستخدم المسجّل في المنصة</div>
      <div class="fg" style="margin-bottom:12px">
        <label class="fl">البريد الإلكتروني <span class="rq">*</span></label>
        <input id="pom-email" class="fc" type="email" placeholder="user@example.com" dir="ltr">
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label class="fl">الباقة الابتدائية</label>
        <select id="pom-plan" class="fc">
          <option value="starter">Starter</option>
          <option value="growth">Growth</option>
          <option value="pro">Pro</option>
        </select>
      </div>
      <div id="pom-err" style="font-size:12px;color:var(--rd);margin-bottom:12px;min-height:16px"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-neu" onclick="document.getElementById('promote-owner-modal').remove()">إلغاء</button>
        <button class="btn btn-or" id="pom-ok">👤 ترقية</button>
      </div>
    </div>`;

  document.body.appendChild(modal);

  document.getElementById('pom-ok').onclick = async () => {
    const email = document.getElementById('pom-email').value.trim();
    const plan  = document.getElementById('pom-plan').value;
    const errEl = document.getElementById('pom-err');
    const btn   = document.getElementById('pom-ok');
    if (!email) { errEl.textContent = 'أدخل البريد الإلكتروني'; return; }
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = '⏳…';
    try {

      modal.remove();
      toast(`✅ تمت ترقية ${email} إلى صاحب مساحة`, 's');
      await loadAll();
    } catch(e) {
      btn.disabled = false; btn.textContent = '👤 ترقية';
      errEl.textContent = e.message;
    }
  };

  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  setTimeout(() => { const el = document.getElementById('pom-email'); if (el) el.focus(); }, 50);
}

/* ═══════════════════════════════════════════════════════════
   PAGE: OWNER REQUESTS — طلبات تحويل الحساب
═══════════════════════════════════════════════════════════ */

/* حالة الفلتر — يشمل الآن contacted */
let oreqSearchVal = '';

function renderOwnerRequests() {
  const all       = allOwnerRequests;
  const nPending   = all.filter(r=>r.status==='pending').length;
  const nContacted = all.filter(r=>r.status==='contacted').length;
  const nApproved  = all.filter(r=>r.status==='approved').length;
  const nRejected  = all.filter(r=>r.status==='rejected').length;

  const typeLabels  = {mall:'🏬 مول',club:'🏊 نادي',school:'🏫 مدرسة',other:'🏢 غيره'};
  const planLabels  = {starter:'Starter',growth:'Growth',pro:'Pro'};
  const planBadges  = {
    starter:`<span class="badge b-starter">Starter</span>`,
    growth:`<span class="badge b-growth">Growth</span>`,
    pro:`<span class="badge b-pro">Pro</span>`,
  };

  /* فلترة */
  let filtered = oreqFilter === 'all' ? [...all] : all.filter(r=>r.status===oreqFilter);
  if (oreqSearchVal) {
    const q = oreqSearchVal.toLowerCase();
    filtered = filtered.filter(r =>
      (r.user_name||'').toLowerCase().includes(q) ||
      (r.user_email||'').toLowerCase().includes(q) ||
      (r.phone||'').includes(q) ||
      (r.place_name||'').toLowerCase().includes(q)
    );
  }

  const filterBtn = (val, label) =>
    `<button class="btn ${oreqFilter===val?'btn-or':'btn-neu'}" style="font-size:11px;padding:5px 12px"
             onclick="oreqFilter='${val}';renderOwnerRequests()">${label}</button>`;

  let html = `
  <!-- إحصائيات -->
  <div class="stats-bar">
    <div class="stat-chip"><span class="stat-num">${all.length}</span> إجمالي</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--yw)">${nPending}</span> معلق</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--bl)">${nContacted}</span> تم التواصل</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--gr)">${nApproved}</span> مقبول</div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--rd)">${nRejected}</span> مرفوض</div>
  </div>

  <!-- فلاتر + بحث -->
  <div class="filter-bar" style="gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:20px">
    ${filterBtn('pending','🟡 معلق')}
    ${filterBtn('contacted','📞 تم التواصل')}
    ${filterBtn('approved','✅ مقبول')}
    ${filterBtn('rejected','❌ مرفوض')}
    ${filterBtn('all','الكل')}
    <input class="f-inp" style="margin-right:auto;width:200px" placeholder="🔍 بحث باسم أو هاتف…"
           value="${esc(oreqSearchVal)}"
           oninput="oreqSearchVal=this.value;renderOwnerRequests()">
    <div style="font-size:12px;color:var(--mu);white-space:nowrap">${filtered.length} طلب</div>
  </div>`;

  if (!filtered.length) {
    html += `<div class="empty-state">
      <div class="empty-ico">📋</div>
      <div class="empty-title">لا توجد طلبات في هذه الحالة</div>
      <div style="font-size:12px;color:var(--mu);margin-top:6px">جرب فلتر "الكل" أو غيّر كلمة البحث</div>
    </div>`;
    setPageContent('owner-requests', html); return;
  }

  /* بطاقات الطلبات */
  html += `<div style="display:flex;flex-direction:column;gap:12px">`;

  filtered.forEach(r => {
    const initial = (r.user_name||r.user_email||'؟').charAt(0).toUpperCase();

    const statusBadge =
      r.status === 'pending'   ? `<span class="badge b-pending">🟡 معلق</span>` :
      r.status === 'contacted' ? `<span class="badge b-contacted">📞 تم التواصل</span>` :
      r.status === 'approved'  ? `<span class="badge b-approved">✅ مقبول</span>` :
                                  `<span class="badge b-rejected">❌ مرفوض</span>`;

    const waLink = r.phone
      ? `<a href="https://wa.me/2${r.phone.replace(/^0/,'').replace(/\D/g,'')}"
            target="_blank" rel="noopener"
            style="display:inline-flex;align-items:center;gap:4px;background:rgba(37,211,102,.15);color:#25d366;
                   border:1px solid rgba(37,211,102,.3);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;
                   text-decoration:none;white-space:nowrap">
           📱 واتساب
         </a>`
      : '';

    const planBadge = r.selected_plan && planBadges[r.selected_plan]
      ? planBadges[r.selected_plan]
      : `<span style="font-size:11px;color:var(--mu)">—</span>`;

    /* أزرار الإجراءات */
    let actions = '';
    if (r.status === 'pending') {
      actions = `
        <button class="btn btn-bl" style="font-size:11px;padding:5px 12px"
                onclick="markContactedRequest('${r.id}')">📞 تم التواصل</button>
        <button class="btn btn-or" style="font-size:11px;padding:5px 12px"
                onclick="promptApproveOwnerRequest('${r.id}','${esc(r.user_name||'')}')">✅ موافقة وتفعيل</button>
        <button class="btn btn-err" style="font-size:11px;padding:5px 12px"
                onclick="promptRejectOwnerRequest('${r.id}')">❌ رفض</button>`;
    } else if (r.status === 'contacted') {
      actions = `
        <button class="btn btn-or" style="font-size:11px;padding:5px 12px"
                onclick="promptApproveOwnerRequest('${r.id}','${esc(r.user_name||'')}')">✅ موافقة وتفعيل</button>
        <button class="btn btn-err" style="font-size:11px;padding:5px 12px"
                onclick="promptRejectOwnerRequest('${r.id}')">❌ رفض</button>`;
    } else if (r.status === 'approved') {
      actions = `<span style="font-size:11px;color:var(--gr)">✓ تم التفعيل</span>`;
    } else {
      actions = `<span style="font-size:11px;color:var(--mu)">${esc(r.rejection_reason||'مرفوض')}</span>`;
    }

    html += `
    <div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:16px 18px;transition:border-color .2s"
         onmouseenter="this.style.borderColor='rgba(255,107,0,.3)'" onmouseleave="this.style.borderColor='rgba(255,255,255,.07)'">

      <!-- رأس البطاقة -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--org);border:1px solid var(--bdo);
                    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;
                    color:var(--or);flex-shrink:0">${esc(initial)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px;color:var(--tx)">${esc(r.user_name||'—')}</div>
          <div style="font-size:11px;color:var(--mu);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.user_email||'—')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${statusBadge}
          <span style="font-size:10px;color:var(--mu)">${fmtDate(r.requested_at)}</span>
        </div>
      </div>

      <!-- تفاصيل -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:14px">
        <div style="background:var(--bg4);border-radius:8px;padding:8px 12px">
          <div style="font-size:10px;color:var(--mu);margin-bottom:3px">📱 الواتساب</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;direction:ltr">${esc(r.phone||'—')}</span>
            ${waLink}
          </div>
        </div>
        <div style="background:var(--bg4);border-radius:8px;padding:8px 12px">
          <div style="font-size:10px;color:var(--mu);margin-bottom:3px">🏢 المكان</div>
          <div style="font-size:12px;font-weight:600">${esc(r.place_name||'—')}</div>
          ${r.place_type ? `<div style="font-size:10px;color:var(--mu);margin-top:2px">${esc(typeLabels[r.place_type]||r.place_type)}</div>` : ''}
        </div>
        <div style="background:var(--bg4);border-radius:8px;padding:8px 12px">
          <div style="font-size:10px;color:var(--mu);margin-bottom:3px">📦 الباقة المطلوبة</div>
          ${planBadge}
        </div>
        ${r.notes ? `<div style="background:var(--bg4);border-radius:8px;padding:8px 12px;grid-column:1/-1">
          <div style="font-size:10px;color:var(--mu);margin-bottom:3px">📝 ملاحظات</div>
          <div style="font-size:12px;color:var(--tx2)">${esc(r.notes)}</div>
        </div>` : ''}
      </div>

      <!-- الإجراءات -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--bd);padding-top:12px">
        ${actions}
      </div>
    </div>`;
  });

  html += `</div>`;
  setPageContent('owner-requests', html);
}

/* ─── تسجيل التواصل ─── */
async function markContactedRequest(id) {
  try {
    await sbRpc('admin_manage_upgrade_request', {
      p_request_id: id, p_action: 'mark_contacted', p_reason: null
    });
    toast('📞 تم تسجيل التواصل مع العميل', 'i');
    await loadAll();
  } catch(e) { toast('خطأ: ' + e.message, 'e'); }
}
