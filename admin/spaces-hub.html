function promptApproveOwnerRequest(id, name) {
  const title = document.getElementById('confirm-title');
  const sub   = document.getElementById('confirm-sub');
  const ok    = document.getElementById('confirm-ok');

  /* default ends_at: سنة من اليوم */
  const d1y = new Date(); d1y.setFullYear(d1y.getFullYear()+1);
  const defaultDate = d1y.toISOString().split('T')[0];

  const inp = (style='') => `style="width:100%;background:var(--bg4);border:1.5px solid var(--mu2);
    border-radius:8px;padding:9px 12px;font-size:13px;color:var(--tx);outline:none;
    font-family:'Cairo',sans-serif;box-sizing:border-box;${style}"`;

  title.textContent = `موافقة على طلب: ${name}`;
  sub.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px">

      <div>
        <div style="font-size:11px;font-weight:600;color:var(--mu);margin-bottom:5px">الباقة المُفعَّلة</div>
        <select id="plan-pick" ${inp()}>
          <option value="growth" selected>📈 Growth — 3,000 ج / شهر</option>
          <option value="pro">⭐ Pro — 4,500 ج / شهر</option>
          <option value="starter">🆓 Starter — مجاناً (محدود)</option>
        </select>
      </div>

      <div>
        <div style="font-size:11px;font-weight:600;color:var(--mu);margin-bottom:5px">
          تاريخ انتهاء الاشتراك <span style="color:var(--rd)">*</span>
        </div>
        <input type="date" id="plan-ends" value="${defaultDate}" ${inp()}>
        <div style="margin-top:7px;display:flex;gap:6px;flex-wrap:wrap">

        ✅ سيتم تفعيل دور المالك + تحديث الباقة + إنشاء سجل اشتراك + إرسال إشعار للحساب

    const endsVal = document.getElementById('plan-ends')?.value;
    if (!endsVal) { toast('اختر تاريخ انتهاء الاشتراك', 'w'); return; }
    const endsAt  = new Date(endsVal + 'T23:59:59').toISOString();
    closeConfirm();

      await sbRpc('admin_manage_upgrade_request', {
        p_request_id: id, p_action: 'approve', p_reason: null,

/* ═══════════════════════════════
   PAGE: SUBSCRIPTIONS
═══════════════════════════════ */
function renderSubscriptions() {
  const now = Date.now(), in7 = now + 7 * 86400000;
  let starter = 0, growth = 0, pro = 0, expiring = 0;
  allOwners.forEach(o => {
    const p = (o.plan_tier || 'starter').toLowerCase();
    if (p === 'starter') starter++;
    else if (p === 'growth') growth++;
    else if (p === 'pro') pro++;
    if (o.sub_ends) {
      const t = new Date(o.sub_ends).getTime();
      if (t > now && t <= in7) expiring++;
    }
  });

  let filtered = allOwners.filter(o => {
    const plan = (o.plan_tier || 'starter').toLowerCase();
    const status = (o.sub_status || 'active').toLowerCase();
    if (subPlanFilter !== 'all' && plan !== subPlanFilter) return false;
    if (subStatusFilter !== 'all' && status !== subStatusFilter) return false;
    if (subExpiringOnly) {
      if (!o.sub_ends) return false;
      const t = new Date(o.sub_ends).getTime();
      if (!(t > now && t <= in7)) return false;
    }
    if (subSearch) {
      const q = subSearch.toLowerCase();
      if (!(o.name || '').toLowerCase().includes(q) && !(o.email || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const rows = filtered.map(o => {
    const plan = (o.plan_tier || 'starter').toLowerCase();
    const status = o.sub_status || 'active';
    const started = o.sub_started ? fmtDate(o.sub_started) : '—';
    const ends = o.sub_ends ? fmtDate(o.sub_ends) : '—';
    const renew = o.sub_renew ? '<span class="sub-renew-on">تلقائي</span>' : '<span class="sub-renew-off">لا</span>';
    return `<tr>
      <td>${esc(o.name || o.email || '—')}</td>
      <td>${esc(o.email || '—')}</td>
      <td><span class="plan-badge ${planCls(plan)}">${planLbl(plan)}</span></td>
      <td>${subStatusBadge(status)}</td>
      <td>${started}</td>
      <td>${ends}</td>
      <td>${renew}</td>
      <td><button class="btn btn-sm" onclick="openSubEditModal('${esc(o.id)}')">تعديل</button></td>
    </tr>`;
  }).join('');

  const html = `
  <div class="sub-kpi-grid">
    <div class="sub-kpi-card kv-starter"><div class="sub-kpi-val">${starter}</div><div class="sub-kpi-lbl">مبتدئ</div></div>
    <div class="sub-kpi-card kv-growth"><div class="sub-kpi-val">${growth}</div><div class="sub-kpi-lbl">نمو</div></div>
    <div class="sub-kpi-card kv-pro"><div class="sub-kpi-val">${pro}</div><div class="sub-kpi-lbl">محترف</div></div>
    <div class="sub-kpi-card kv-expiring"><div class="sub-kpi-val">${expiring}</div><div class="sub-kpi-lbl">تنتهي خلال 7 أيام</div></div>
  </div>
  <div class="filter-bar" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <input type="text" placeholder="بحث باسم أو بريد..." value="${esc(subSearch)}"
      oninput="subSearch=this.value;renderSubscriptions()" style="flex:1;min-width:160px">
    <select onchange="subPlanFilter=this.value;renderSubscriptions()">
      <option value="all" ${subPlanFilter==='all'?'selected':''}>كل الباقات</option>
      <option value="starter" ${subPlanFilter==='starter'?'selected':''}>مبتدئ</option>
      <option value="growth" ${subPlanFilter==='growth'?'selected':''}>نمو</option>
      <option value="pro" ${subPlanFilter==='pro'?'selected':''}>محترف</option>
    </select>
    <select onchange="subStatusFilter=this.value;renderSubscriptions()">
      <option value="all" ${subStatusFilter==='all'?'selected':''}>كل الحالات</option>
      <option value="active" ${subStatusFilter==='active'?'selected':''}>نشط</option>
      <option value="cancelled" ${subStatusFilter==='cancelled'?'selected':''}>ملغى</option>
      <option value="trial" ${subStatusFilter==='trial'?'selected':''}>تجريبي</option>
      <option value="expired" ${subStatusFilter==='expired'?'selected':''}>منتهي</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" ${subExpiringOnly?'checked':''} onchange="subExpiringOnly=this.checked;renderSubscriptions()">
      <span>ينتهي قريباً</span>
    </label>
    <span style="color:var(--mu);font-size:13px;align-self:center">${filtered.length} من ${allOwners.length}</span>
  </div>
  <div class="tbl-wrap">
    <table class="sub-table">
      <thead><tr>
        <th>الاسم</th><th>البريد</th><th>الباقة</th><th>الحالة</th>
        <th>بدأ</th><th>ينتهي</th><th>تجديد تلقائي</th><th>إجراء</th>
      </tr></thead>
      <tbody>${rows || '<tr><td colspan="8" style="text-align:center;color:var(--mu);padding:24px">لا توجد نتائج</td></tr>'}</tbody>
    </table>
  </div>`;
  setPageContent('subscriptions', html);
}

function subStatusBadge(s) {
  const map = {
    active:    ['sub-badge-active',    'نشط'],
    trial:     ['sub-badge-trial',     'تجريبي'],
    cancelled: ['sub-badge-cancelled', 'ملغى'],
    expired:   ['sub-badge-expired',   'منتهي'],
  };
  const [cls, lbl] = map[s] || ['sub-badge-active', s || 'نشط'];
  return `<span class="sub-status-badge ${cls}">${lbl}</span>`;
}

function openSubEditModal(ownerId) {
  editingSubOwner = allOwners.find(o => o.id === ownerId);
  if (!editingSubOwner) return;
  const o = editingSubOwner;
  document.getElementById('sub-edit-name').textContent = o.name || o.email || ownerId;
  document.getElementById('sub-edit-plan').value = (o.plan_tier || 'starter').toLowerCase();
  document.getElementById('sub-edit-status').value = o.sub_status || 'active';
  const endsVal = o.sub_ends ? o.sub_ends.slice(0, 10) : '';
  document.getElementById('sub-edit-ends').value = endsVal;
  document.getElementById('sub-edit-renew').checked = !!o.sub_renew;
  document.getElementById('sub-edit-notes').value = o.sub_notes || '';
  document.getElementById('sub-edit-modal').classList.add('open');
}

function closeSubEditModal() {
  document.getElementById('sub-edit-modal').classList.remove('open');
  editingSubOwner = null;
}

async function saveSubEditData() {
  if (!editingSubOwner) return;
  const o = editingSubOwner;
  const newPlan   = document.getElementById('sub-edit-plan').value;
  const newStatus = document.getElementById('sub-edit-status').value;
  const endsRaw   = document.getElementById('sub-edit-ends').value;
  const endsAt    = endsRaw ? endsRaw + 'T23:59:59+00:00' : null;
  const autoRenew = document.getElementById('sub-edit-renew').checked;
  const notes     = document.getElementById('sub-edit-notes').value.trim() || null;

  const btn = document.getElementById('sub-save-btn');
  btn.disabled = true;
  btn.textContent = 'جاري الحفظ...';
  try {
    await sbRpc('admin_set_plan_tier', {
      p_owner_id:  o.id,
      p_plan_tier: newPlan,
      p_ends_at:   endsAt,
      p_notes:     notes,
    });
    await sbRpc('admin_upsert_subscription', {
      p_user_id:    o.id,
      p_plan:       newPlan,
      p_status:     newStatus,
      p_started_at: o.sub_started || new Date().toISOString(),
      p_ends_at:    endsAt,
      p_auto_renew: autoRenew,
      p_notes:      notes,
    });
    o.plan_tier   = newPlan;
    o.sub_status  = newStatus;
    o.sub_ends    = endsRaw ? endsAt : null;
    o.sub_renew   = autoRenew;
    o.sub_notes   = notes;
    closeSubEditModal();
    renderSubscriptions();
    toast('✅ تم حفظ الاشتراك بنجاح', 'i');
  } catch(e) {
    toast('خطأ: ' + e.message, 'e');
  } finally {
    btn.disabled = false;
    btn.textContent = 'حفظ';
  }
}

function clearActivityForm(){['act-id','act-name','act-emoji','act-order'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const a=document.getElementById('act-active');if(a)a.value='true';}
function fillActivity(id){const a=allActivities.find(x=>x.id===id);if(!a)return;document.getElementById('act-id').value=a.id;document.getElementById('act-name').value=a.name_ar||'';document.getElementById('act-emoji').value=a.emoji||'';document.getElementById('act-order').value=a.sort_order??0;document.getElementById('act-active').value=String(a.is_active!==false);}
async function saveActivity(){const id=(document.getElementById('act-id')?.value||'').trim().toLowerCase().replace(/\s+/g,'-');const name=(document.getElementById('act-name')?.value||'').trim();if(!id||!name){toast('اكتب ID واسم النشاط','e');return;}const payload={id,name_ar:name,emoji:(document.getElementById('act-emoji')?.value||'').trim()||null,sort_order:parseInt(document.getElementById('act-order')?.value||'0')||0,is_active:document.getElementById('act-active')?.value!=='false'};try{const exists=allActivities.some(a=>a.id===id);await sbTable(exists?'PATCH':'POST','space_activities',exists?payload:[payload],exists?`?id=eq.${encodeURIComponent(id)}`:'');allActivities=await fetchActivities();clearActivityForm();renderActivities();toast('تم حفظ النشاط','s');}catch(e){toast('خطأ: '+e.message,'e');}}
async function toggleActivity(id,isActive){try{await sbTable('PATCH','space_activities',{is_active:!isActive},`?id=eq.${encodeURIComponent(id)}`);allActivities=await fetchActivities();renderActivities();toast('تم تحديث النشاط','s');}catch(e){toast('خطأ: '+e.message,'e');}}
function deleteActivity(id) {
  const act = allActivities.find(a => a.id === id);
  const actName = act ? `${act.emoji||''} ${act.name_ar||id}`.trim() : id;
  const affected = allSpaces.filter(s => Array.isArray(s.activities) && s.activities.includes(id));
  const existing = document.getElementById('del-act-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'del-act-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--bg3);border:1.5px solid rgba(239,68,68,.4);border-radius:var(--r2);padding:28px;max-width:440px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.7)">
      <div style="font-size:26px;text-align:center;margin-bottom:10px">🗑️</div>
      <div style="font-size:15px;font-weight:800;color:var(--rd);margin-bottom:8px;text-align:center">حذف النشاط</div>
      <div style="font-size:13px;font-weight:700;text-align:center;margin-bottom:12px">${esc(actName)}</div>
      ${affected.length ? `
        <div style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--yw);line-height:1.8">
          ⚠ هذا النشاط مرتبط بـ <b>${affected.length}</b> مساحة.
          إذا حذفت فقط، سيبقى ID النشاط داخل تلك المساحات ولن يظهر بشكل صحيح.
        </div>
        <div style="font-size:12px;color:var(--mu);margin-bottom:6px">المساحات المتأثرة:</div>
        <div style="max-height:100px;overflow-y:auto;margin-bottom:16px;display:flex;flex-direction:column;gap:4px">
          ${affected.map(s=>`<div style="font-size:11px;background:var(--bg4);border-radius:6px;padding:4px 8px;color:var(--tx)">${esc(s.name||s.id)}</div>`).join('')}
        </div>
      ` : `<div style="font-size:12px;color:var(--mu);text-align:center;margin-bottom:16px">لا توجد مساحات تستخدم هذا النشاط حالياً.</div>`}
      <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
        <button class="btn btn-neu" onclick="document.getElementById('del-act-modal').remove()">إلغاء</button>
        ${affected.length ? `<button class="btn btn-yw" id="del-act-only">حذف النشاط فقط</button>` : ''}
        <button class="btn btn-err" id="del-act-clean">${affected.length ? 'حذف وتنظيف المساحات' : 'حذف النشاط'}</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target===modal) modal.remove(); });

  async function doDelete(cleanup) {
    const btns = modal.querySelectorAll('button');
    btns.forEach(b=>b.disabled=true);
    try {
      await sbTable('DELETE','space_activities',null,`?id=eq.${encodeURIComponent(id)}`);
      if (cleanup && affected.length) {
        await sbRpc('admin_remove_activity_from_spaces',{p_activity_id:id});
      }
      modal.remove();
      allActivities = await fetchActivities();
      if (cleanup && affected.length) await loadAll();
      renderActivities();
      toast(cleanup ? '🗑 تم حذف النشاط وتنظيف المساحات' : '🗑 تم حذف النشاط', 's');
    } catch(e) {
      btns.forEach(b=>b.disabled=false);
      toast('خطأ: '+e.message,'e');
    }
  }

  const btnOnly  = modal.querySelector('#del-act-only');
  const btnClean = modal.querySelector('#del-act-clean');
  if (btnOnly)  btnOnly.onclick  = () => doDelete(false);
  if (btnClean) btnClean.onclick = () => doDelete(affected.length > 0);
}

/* ═══════════════════════════════
   CHART HELPERS
═══════════════════════════════ */
function buildBarChartSVG(series, months, opts = {}) {
  const { color = '#FF6B00', height = 110, label = '' } = opts;
  if (!series.length) return `<div style="color:var(--mu);font-size:11px;text-align:center;padding:20px">لا توجد بيانات</div>`;
  const maxVal = Math.max(...series, 1);
  const W = 400, H = height, pad = { t: 10, b: 22, l: 28, r: 8 };
  const cw  = (W - pad.l - pad.r) / series.length;
  const bars = series.map((v, i) => {
    const bh = ((v / maxVal) * (H - pad.t - pad.b)) || 1;
    const x  = pad.l + i * cw + cw * 0.12;
    const y  = H - pad.b - bh;
    const bw = cw * 0.76;
    const mLabel = months[i] ? months[i].slice(5) : '';
    const showLabel = i === 0 || i === series.length - 1 || i % Math.max(1, Math.floor(series.length / 5)) === 0;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${color}" opacity="0.85">
        <title>${mLabel}: ${v}</title></rect>
      ${showLabel ? `<text x="${x + bw/2}" y="${H - pad.b + 14}" text-anchor="middle" font-size="8.5" fill="#888">${mLabel}</text>` : ''}
      ${v > 0 && bh > 14 ? `<text x="${x + bw/2}" y="${y + 11}" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">${v}</text>` : ''}`;
  }).join('');
  const ySteps = [0, Math.round(maxVal / 2), maxVal].map((v, i) => {
    const y = H - pad.b - (v / maxVal) * (H - pad.t - pad.b);
    return `<line x1="${pad.l}" x2="${W - pad.r}" y1="${y}" y2="${y}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      <text x="${pad.l - 3}" y="${y + 4}" text-anchor="end" font-size="8.5" fill="#666">${v}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${height}px;display:block">${ySteps}${bars}</svg>`;
}

function buildLineChartSVG(series, months, opts = {}) {
  const { color = '#FF6B00', height = 110 } = opts;
  if (series.length < 2) return buildBarChartSVG(series, months, opts);
  const maxVal = Math.max(...series, 1);
  const W = 400, H = height, pad = { t: 10, b: 22, l: 28, r: 8 };
  const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  const pts = series.map((v, i) => ({
    x: pad.l + (i / (series.length - 1)) * iw,
    y: pad.t + ih - (v / maxVal) * ih,
    v, m: months[i] ? months[i].slice(5) : ''
  }));
  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaD = pathD + ` L${pts[pts.length-1].x.toFixed(1)},${H-pad.b} L${pad.l},${H-pad.b} Z`;
  const dots  = pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${color}"><title>${p.m}: ${p.v}</title></circle>`).join('');
  const xLbls = pts.filter((_, i) => i === 0 || i === pts.length-1 || i % Math.max(1, Math.floor(pts.length/5)) === 0)
    .map(p => `<text x="${p.x.toFixed(1)}" y="${H-pad.b+14}" text-anchor="middle" font-size="8.5" fill="#888">${p.m}</text>`).join('');
  const yLbls = [0, Math.round(maxVal/2), maxVal].map((v, i) => {
    const y = pad.t + ih - (v / maxVal) * ih;
    return `<line x1="${pad.l}" x2="${W-pad.r}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,.06)"/>
      <text x="${pad.l-3}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="8.5" fill="#666">${v}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${height}px;display:block">
    <defs><linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.03"/>
    </linearGradient></defs>
    ${yLbls}
    <path d="${areaD}" fill="url(#lcg)"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${dots}${xLbls}
  </svg>`;
}

/* fill a 12-month skeleton so missing months show as zero */
function fillMonthSeries(data, months12) {
  const map = {};
  (data || []).forEach(d => { map[d.month] = d; });
  return months12.map(m => map[m] || { month: m, count: 0, confirmed: 0, mrr_added: 0 });
}

function last12Months() {
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() - i);
    months.push(d.toISOString().slice(0, 7));
  }
  return months;
}

}

async function sendBulkNotif() {
  const title = document.getElementById('notif-title')?.value.trim();
  const body  = document.getElementById('notif-body')?.value.trim();
  const type  = document.getElementById('notif-type')?.value || 'admin_announcement';
  if (!title) { toast('أدخل عنوان الإشعار','e'); return; }
  if (!body)  { toast('أدخل نص الرسالة','e'); return; }

  let ownerIds = null;
  if (notifTarget === 'specific') {
    if (!notifPickedIds.size) { toast('اختر مالكاً واحداً على الأقل','e'); return; }
    ownerIds = [...notifPickedIds];
  } else if (notifTarget === 'active_sub') {
    ownerIds = allOwners.filter(o=>o.sub_status==='active').map(o=>o.id);
  } else if (notifTarget === 'expired_sub') {
    ownerIds = allOwners.filter(o=>o.sub_status==='expired').map(o=>o.id);
  }
  /* 'all' → ownerIds stays null → RPC inserts for all */

  const btn = document.querySelector('#pg-notif .btn-or');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ الإرسال...'; }
  try {
    const res = await sbRpc('admin_send_bulk_notification', {
      p_title:     title,
      p_body:      body,
      p_type:      type,
      p_owner_ids: ownerIds,
    });
    const sent = res?.sent ?? 0;
    const targetLabels = {all:'كل الأصحاب',active_sub:'اشتراك نشط',expired_sub:'اشتراك منتهي',specific:'محددون'};
    saveNotifHistory({ at: new Date().toISOString(), title, targetLabel: targetLabels[notifTarget]||notifTarget, sent });
    toast(`✅ تم إرسال الإشعار لـ ${sent} مالك`, 's');
    document.getElementById('notif-title').value = '';
    document.getElementById('notif-body').value  = '';
    renderBulkNotif();
  } catch(e) {
    toast('خطأ: '+e.message, 'e');
    if (btn) { btn.disabled = false; btn.textContent = '📣 إرسال الإشعار'; }
  }
}

function getCheckedCols(listId) {
  return [...document.querySelectorAll(`#${listId} input[type=checkbox]:checked`)].map(c=>c.value);
}

function csvEsc(v) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function downloadCSV(filename, rows) {
  const bom   = '﻿';
  const csv   = bom + rows.map(r => r.map(csvEsc).join(',')).join('\r\n');
  const blob  = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportSpacesCSV() {
  const cols   = getCheckedCols('spaces-col-list');
  if (!cols.length) { toast('اختر عموداً واحداً على الأقل','e'); return; }
  const filter = document.getElementById('spaces-export-status')?.value || '';
  const spaceCountByOwner = {};
  const approvedByOwner   = {};
  allSpaces.forEach(s => {
    spaceCountByOwner[s.owner_id] = (spaceCountByOwner[s.owner_id]||0) + 1;
    if (s.status === 'live') approvedByOwner[s.owner_id] = (approvedByOwner[s.owner_id]||0) + 1;
  });

  const rows = allSpaces
    .filter(s => !filter || s.status === filter)
    .map(s => cols.map(c => s[c] ?? ''));

  const colLabels = {id:'المعرف',name:'الاسم',region:'المنطقة',type:'النوع',status:'الحالة',owner_id:'ID المالك',sizes_prices:'الأحجام والأسعار',min_price:'أقل سعر',description:'الوصف',created_at:'تاريخ الإضافة'};
  downloadCSV(`spaces-${new Date().toISOString().slice(0,10)}.csv`, [cols.map(c=>colLabels[c]||c), ...rows]);
  toast(`✅ تم تصدير ${rows.length} مساحة`,'s');
}

function exportOwnersCSV() {
  const cols   = getCheckedCols('owners-col-list');
  if (!cols.length) { toast('اختر عموداً واحداً على الأقل','e'); return; }
  const filter = document.getElementById('owners-export-filter')?.value || '';

  const spaceCountByOwner   = {};
  const approvedCountByOwner = {};
  allSpaces.forEach(s => {
    spaceCountByOwner[s.owner_id]    = (spaceCountByOwner[s.owner_id]||0) + 1;
    if (s.status === 'approved') approvedCountByOwner[s.owner_id] = (approvedCountByOwner[s.owner_id]||0) + 1;
  });

  let owners = allOwners;
  if (filter === 'active_sub')  owners = owners.filter(o=>o.sub_status==='active');
  if (filter === 'expired_sub') owners = owners.filter(o=>o.sub_status==='expired');
  if (filter === 'suspended')   owners = owners.filter(o=>o.is_suspended);

  const rows = owners.map(o => cols.map(c => {
    if (c === 'is_suspended')   return o.is_suspended ? 'نعم' : 'لا';
    if (c === 'spaces_count')   return spaceCountByOwner[o.id] || 0;
    if (c === 'approved_count') return approvedCountByOwner[o.id] || 0;
    if (c === 'email')          return o.email || o.user_email || '';
    return o[c] ?? '';
  }));

  const colLabels = {id:'المعرف',display_name:'الاسم',email:'البريد',plan_tier:'الباقة',sub_status:'حالة الاشتراك',sub_ends:'تاريخ انتهاء الاشتراك',is_suspended:'موقوف؟',spaces_count:'عدد المساحات',approved_count:'مساحات مقبولة'};
  downloadCSV(`owners-${new Date().toISOString().slice(0,10)}.csv`, [cols.map(c=>colLabels[c]||c), ...rows]);
  toast(`✅ تم تصدير ${rows.length} مالك`,'s');
}

async function doCleanupBookings(dryRun) {
  const cancelled = document.getElementById('maint-bk-cancelled')?.checked;
  const completed = document.getElementById('maint-bk-completed')?.checked;
  const days      = parseInt(document.getElementById('maint-bk-days')?.value||'90', 10);
  const statuses  = [cancelled&&'cancelled', completed&&'completed'].filter(Boolean);
  if (!statuses.length) { toast('اختر حالة واحدة على الأقل', 'w'); return; }

  const prev   = document.getElementById('maint-bk-preview');
  const delBtn = document.getElementById('maint-bk-del-btn');
  if (prev) prev.innerHTML = '<span style="color:var(--mu)">⏳ جاري...</span>';

  try {
    const res = await sbRpc('admin_cleanup_bookings', {
      p_older_than_days: days,
      p_statuses: statuses, p_dry_run: dryRun
    });
    if (dryRun) {
      const n = res.would_delete || 0;
      if (prev) prev.innerHTML = n > 0
        ? `<span style="color:var(--rd)">⚠ <b>${n}</b> حجز سيُحذف نهائياً — تأكد قبل المتابعة</span>`
        : `<span style="color:var(--gn)">✓ لا توجد حجوزات تستوفي شروط الحذف</span>`;
      if (delBtn) { delBtn.disabled = n===0; delBtn.style.opacity = n===0?'.5':'1'; }
    } else {
      const n = res.deleted || 0;
      toast(`✅ تم حذف ${n} حجز نهائياً من قاعدة البيانات`, 's');
      renderMaintenance();
    }
  } catch(e) { toast('خطأ: ' + e.message, 'e'); }
}

async function doDeleteUnit(unitId, spaceId) {
  if (!confirm('حذف هذه الوحدة؟')) return;
  try {
    await sbRpc('admin_delete_unit',{p_unit_id:unitId});
    toast('🗑 تم حذف الوحدة','s');
    invalidateDetailCache(spaceId);
    const panel = document.getElementById('detail-panel-'+spaceId);
    if (panel) {
      delete panel.dataset.loaded;
      const d = await loadSpaceDetail(spaceId);
      panel.innerHTML = buildDetailHtml(d.space,d.units,d.owner);
      panel.dataset.loaded='1';
    }
    allSpaces = allSpaces.map(s=>s.id===spaceId?{...s,units_count:Math.max(0,(s.units_count||1)-1)}:s);
    updatePendingBadge();
  } catch(e) { toast('خطأ: '+e.message,'e'); }
}

function invalidateDetailCache(id) {
  const p1 = document.getElementById('detail-panel-'+id);
  const p2 = document.getElementById('pdetail-'+id);
  if (p1) delete p1.dataset.loaded;
  if (p2) delete p2.dataset.loaded;
}

      try {
        await sbRpc('admin_manage_space',{p_space_id:id,p_action:'review',p_reason:null});

    addAuditEntry('مراجعة جماعية', '', `${ok} مساحة`);

    toast(`👁 تم وضع علامة مُراجَع على ${ok} مساحة${fail?' — فشل '+fail:''}`, ok?'s':'e');
    await loadAll();
  });

  const inp = modal.querySelector('#bd-inp');
  const btn = modal.querySelector('#bd-ok');
  inp.addEventListener('input', ()=>{ btn.disabled = inp.value.trim() !== 'حذف'; });
  btn.onclick = async () => {
    btn.disabled = true; btn.textContent = '⏳…';
    let ok = 0, fail = 0;
    for (const id of ids) {
      try {
        await sbRpc('admin_manage_space',{p_space_id:id,p_action:'delete',p_reason:null});
        ok++;
      } catch(e) { fail++; }
    }
    addAuditEntry('حذف جماعي', '', `${ok} مساحة من أصل ${ids.length}`);
    selectedSpaceIds.clear();
    modal.remove();
    toast(`🗑 تم حذف ${ok} مساحة${fail?' — فشل '+fail:''}`, ok?'s':'e');
    await loadAll();
  };
  modal.addEventListener('click', e => { if (e.target===modal) modal.remove(); });
  setTimeout(()=>inp.focus(), 50);
}

/* ═══════════════════════════════
   AUDIT LOG (DB + localStorage fallback)
═══════════════════════════════ */
const AUDIT_LS_KEY = 'mkspot_audit_v1';

function addAuditEntry(action, targetId, detail) {
  /* Write to DB asynchronously — don't await, failures are silent */
  if (adminHash) {
    sbRpc('admin_log_action', {
      p_action: action, p_target_id: String(targetId||''),
      p_target_name: detail||'', p_detail: '',
    }).catch(()=>{});
  }
  /* Also keep a local copy for instant display */
  try {
    const log = JSON.parse(localStorage.getItem(AUDIT_LS_KEY)||'[]');
    log.unshift({ts: new Date().toISOString(), action, targetId, detail});
    localStorage.setItem(AUDIT_LS_KEY, JSON.stringify(log.slice(0,100)));
  } catch(e) {}
}

async function loadAndRenderAuditSection(containerEl) {
  containerEl.innerHTML = `<span class="spin">⏳</span>`;
  let entries = [];
  try {
    entries = await sbRpc('admin_get_audit_log', {p_limit: 50});
  } catch(e) {
    /* Fallback to localStorage */
    try { entries = JSON.parse(localStorage.getItem(AUDIT_LS_KEY)||'[]')
      .map(e=>({action:e.action, target_name:e.detail, created_at:e.ts})); } catch(_) {}
  }
  if (!entries || !entries.length) {
    containerEl.innerHTML = `<div style="color:var(--mu);font-size:12px;padding:12px">لا توجد إجراءات مسجّلة بعد</div>`;
    return;
  }
  const actionColor = a => ({
    'قبول':'var(--gr)','رفض':'var(--rd)','حذف':'var(--rd)',
    'إخفاء':'var(--mu)','إظهار':'var(--bl)',
    'قبول جماعي':'var(--gr)','حذف جماعي':'var(--rd)','تبديل ظهور جماعي':'var(--mu)',
  }[a] || 'var(--tx2)');
  containerEl.innerHTML = `
    <div class="audit-row" style="background:var(--bg4);font-weight:700;font-size:10px;color:var(--mu);border-radius:var(--r) var(--r) 0 0">
      <div>التاريخ والوقت</div><div>الإجراء</div><div>التفاصيل</div><div></div>
    </div>
    ${entries.map(e=>`
    <div class="audit-row">
      <div style="color:var(--mu);font-size:10px">${fmtDate(e.created_at)}</div>
      <div><span style="font-weight:700;color:${actionColor(e.action)}">${esc(e.action)}</span></div>
      <div style="color:var(--tx2)">${esc(e.target_name||e.detail||'—')}</div>
      <div></div>
    </div>`).join('')}`;
}

async function editSpace(id) {

function activityPickerHtml(selected) {
  const selectedSet = new Set(selected || []);
  const items = allActivities.length ? allActivities : [
    {id:'coffee',emoji:'☕',name_ar:'قهوة ومشروبات',is_active:true},
    {id:'food',emoji:'🥪',name_ar:'أكل سريع',is_active:true},
    {id:'sweets',emoji:'🍰',name_ar:'حلويات ومخبوزات',is_active:true},
    {id:'accessories',emoji:'💍',name_ar:'إكسسوارات',is_active:true},
  ];
  const knownValues = new Set();
  const chips = items.filter(a=>a.is_active!==false).map(a=>{
    knownValues.add(a.id);
    knownValues.add(a.name_ar);
    const label = `${a.emoji||''} ${a.name_ar||a.id}`.trim();
    knownValues.add(label);
    const checked = selectedSet.has(a.id) || selectedSet.has(a.name_ar) || selectedSet.has(label);
    return `<label class="pick-chip"><input type="checkbox" class="act-pick" value="${esc(a.id)}" ${checked?'checked':''}> <span>${esc(a.emoji||'🏷️')} ${esc(a.name_ar||a.id)}</span></label>`;
  }).join('');
  const custom = (selected||[]).filter(x=>!knownValues.has(x)).join(' · ');
  return `<div class="chip-grid">${chips}</div><div class="form-toolbar"><input class="fc" id="f-acts-custom" value="${esc(custom)}" placeholder="أنشطة إضافية مفصولة بـ ·"></div>`;
}

function amenityPickerHtml(selected) {
  const set = new Set(selected || []);
  const chips = AMENITY_PRESETS.map(a=>`<label class="pick-chip"><input type="checkbox" class="amen-pick" value="${esc(a)}" ${set.has(a)?'checked':''}> <span>${esc(a)}</span></label>`).join('');
  const custom = (selected||[]).filter(x=>!AMENITY_PRESETS.includes(x)).join(' · ');
  return `<div class="chip-grid">${chips}</div><div class="form-toolbar"><input class="fc" id="f-amen-custom" value="${esc(custom)}" placeholder="مرافق إضافية مفصولة بـ ·"></div>`;
}

function getPickedValues(selector, customId) {
  const picked = [...document.querySelectorAll(selector+':checked')].map(x=>x.value.trim()).filter(Boolean);
  const custom = (document.getElementById(customId)?.value||'').split('·').map(s=>s.trim()).filter(Boolean);
  return [...new Set([...picked, ...custom])];
}

        :`<div class="upload-zone" id="fu-img-zone-${idx}" onclick="document.getElementById('fu-img-${idx}').click()" style="padding:12px">
            <div style="font-size:16px">📤</div>
            <div class="upload-zone-lbl">صورة الوحدة</div>
          </div>
          <div id="fu-img-preview-${idx}" style="margin-top:6px"></div>`}
      <input type="file" id="fu-img-${idx}" accept="image/*" style="display:none" onchange="handleUnitImg(this,${idx})">
      <div id="fu-img-status-${idx}" class="upload-status" style="color:var(--mu)">${fUnitImgUrls[idx]||data.image_url?'✅ صورة محفوظة':''}</div>
    </div>
  </div>`;
}

function addUnitRow() {

  if (empty) empty.style.display = 'none';

  cont.appendChild(div.firstElementChild);

function removeUnitRow(idx, dbId) {

function cancelForm() {
  editingId = null;

}

/* ═══════════════════════════════
   IMAGE UPLOAD
═══════════════════════════════ */
async function handleMainImg(input) {
  const file = input.files?.[0];
  if (!file) return;
  const preview = document.getElementById('f-main-preview');
  const status  = document.getElementById('f-main-status');
  const pUrl = URL.createObjectURL(file);
  if (preview) preview.innerHTML = `<div style="position:relative"><img src="${pUrl}" style="width:100%;max-height:160px;object-fit:cover;border-radius:var(--r);opacity:.6"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;background:rgba(0,0,0,.4);border-radius:var(--r)">⏳ جاري الرفع…</div></div>`;
  if (status) status.innerHTML = '<span style="color:var(--yw)">⏳ جاري الرفع…</span>';
  try {
    const folder = editingId?`admin-spaces/${editingId}`:`admin-spaces/new`;
    const [url]  = await uploadImages([file], folder, null, SB_KEY);
    fMainImgUrl = url;
    if (preview) preview.innerHTML = `<div style="position:relative"><img src="${url.replace('_f.webp','_d.webp')}" style="width:100%;max-height:160px;object-fit:cover;border-radius:var(--r);border:2px solid rgba(0,200,83,.35)"><button type="button" onclick="clearMainImg()" style="position:absolute;top:5px;left:5px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px">✕</button></div>`;
    if (status) status.innerHTML = '<span style="color:var(--gr)">✅ تم الرفع</span>';
  } catch(e) {
    fMainImgUrl = null;
    if (preview) preview.innerHTML = '';
    if (status) status.innerHTML = `<span style="color:var(--rd)">❌ فشل: ${esc(e.message)}</span>`;
  }
}
function clearMainImg() {
  fMainImgUrl = null;
  const p = document.getElementById('f-main-preview');
  const s = document.getElementById('f-main-status');
  if (p) p.innerHTML = '';
  if (s) s.textContent = 'لم تُرفع';
  const i = document.getElementById('f-main-img');
  if (i) i.value = '';
}

async function handleExtraImgs(input) {
  const remaining = 5 - fExtraImgUrls.filter(Boolean).length;
  const files = Array.from(input.files).slice(0, remaining);
  const cont  = document.getElementById('f-extra-preview');
  if (!files.length || !cont) return;
  for (const file of files) {
    const idx = fExtraImgUrls.length;
    fExtraImgUrls.push(null);
    const div = document.createElement('div');
    div.className = 'extra-img-wrap'; div.id = 'fei-'+idx;
    div.innerHTML = `<img src="${URL.createObjectURL(file)}" style="opacity:.6"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;background:rgba(0,0,0,.4)">⏳</div>`;
    cont.appendChild(div);
    try {
      const folder = editingId?`admin-spaces/${editingId}`:`admin-spaces/new`;
      const [url]  = await uploadImages([file], folder, null, SB_KEY);
      fExtraImgUrls[idx] = url;
      div.innerHTML = `<img src="${url.replace('_f.webp','_c.webp')}"><button class="extra-img-del" onclick="removeExtraImg(${idx})">✕</button>`;
    } catch { fExtraImgUrls[idx] = null; div.remove(); }
  }
  input.value = '';
}
function removeExtraImg(idx) {
  fExtraImgUrls[idx] = null;
  const el = document.getElementById('fei-'+idx);
  if (el) el.remove();
}
function extraImgHtml(url, idx) {
  return `<div class="extra-img-wrap" id="fei-${idx}"><img src="${url.replace('_f.webp','_c.webp')}" onerror="this.src='${url}'"><button class="extra-img-del" onclick="removeExtraImg(${idx})">✕</button></div>`;
}

async function handleUnitImg(input, idx) {
  const file = input.files?.[0];
  if (!file) return;
  const preview = document.getElementById('fu-img-preview-'+idx);
  const zone    = document.getElementById('fu-img-zone-'+idx);
  const status  = document.getElementById('fu-img-status-'+idx);
  if (preview) preview.innerHTML = `<img src="${URL.createObjectURL(file)}" style="width:100%;max-height:110px;object-fit:cover;border-radius:var(--r);opacity:.6">`;
  if (zone)    zone.style.display = 'none';
  if (status)  status.innerHTML   = '<span style="color:var(--yw)">⏳ جاري الرفع…</span>';
  try {
    const ts   = Date.now();
    const rand = Math.random().toString(36).slice(2,6);
    const path = `admin-spaces/${editingId||'new'}/units/${ts}_${rand}.webp`;
    const url  = await uploadSingleImageToR2(file, path, SB_KEY);
    fUnitImgUrls[idx] = url;
    if (preview) preview.innerHTML = `<img src="${url}" style="width:100%;max-height:110px;object-fit:cover;border-radius:var(--r);border:2px solid rgba(0,200,83,.35)">`;
    if (status)  status.innerHTML  = '<span style="color:var(--gr)">✅ تم الرفع</span>';
  } catch(e) {
    delete fUnitImgUrls[idx];
    if (preview) preview.innerHTML = '';
    if (zone)    zone.style.display = 'block';
    if (status)  status.innerHTML   = '<span style="color:var(--rd)">❌ فشل</span>';
  }
}
function clearUnitImg(idx) {
  delete fUnitImgUrls[idx];
  const preview = document.getElementById('fu-img-preview-'+idx);
  const zone    = document.getElementById('fu-img-zone-'+idx);
  if (preview) preview.innerHTML = '';
  if (zone)    zone.style.display = 'block';
}

/* ═══════════════════════════════
   FORM SUBMIT
═══════════════════════════════ */
async function submitSpaceForm() {
  const get = id => document.getElementById(id)?.value?.trim()||'';
  const name   = get('f-name');
  const region = get('f-region');
  if (!name || !region) { showFormMsg('error','اسم المساحة والمنطقة مطلوبان'); return; }

  /* ── Hard block: sizes format ── */
  const sizesVal = get('f-sizes');
  if (sizesVal) {
    const badEntries = sizesVal.split(/[|·]/).map(e=>e.trim()).filter(e=>e && !e.includes(':'));
    if (badEntries.length) {
      showFormMsg('error', `خطأ في حقل الأحجام — كل إدخال يجب أن يحتوي على ":" مثل "١×١م:4500". إدخالات خاطئة: ${badEntries.slice(0,3).map(e=>`"${e}"`).join('، ')}`);
      document.getElementById('f-sizes')?.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }

  /* ── Soft warnings (skip once if user bypassed) ── */
  if (!formBypassWarnings) {
    const warnings = [];
    if (!fMainImgUrl) warnings.push({ icon:'🖼', text:'لا توجد صورة رئيسية — ستظهر المساحة بدون صورة على الماركت' });
    if (!get('f-desc'))  warnings.push({ icon:'📝', text:'لا يوجد وصف — العملاء لن يعرفوا تفاصيل المساحة' });
    if (!get('f-price') && !sizesVal) warnings.push({ icon:'💰', text:'لا يوجد سعر أو أحجام — يصعب على العملاء اتخاذ القرار' });
    if (warnings.length) {
      const existing = document.getElementById('form-warn-modal');
      if (existing) existing.remove();
      const modal = document.createElement('div');
      modal.id = 'form-warn-modal';
      modal.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center';
      modal.innerHTML = `
        <div style="background:var(--bg3);border:1.5px solid rgba(245,158,11,.4);border-radius:var(--r2);padding:28px;max-width:420px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.7)">
          <div style="font-size:26px;text-align:center;margin-bottom:8px">⚠️</div>
          <div style="font-size:15px;font-weight:800;text-align:center;margin-bottom:6px">المساحة ناقصة بيانات</div>
          <div style="font-size:12px;color:var(--mu);text-align:center;margin-bottom:16px">ستظهر على المنصة بدون:</div>
          <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:20px">
            ${warnings.map(w=>`<div style="display:flex;align-items:center;gap:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:9px 12px">
              <span style="font-size:16px">${w.icon}</span>
              <span style="font-size:12px;color:var(--yw);line-height:1.5">${w.text}</span>
            </div>`).join('')}
          </div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button class="btn btn-or" id="fw-save-anyway">احفظ على أي حال</button>
            <button class="btn btn-neu" id="fw-back">عودة للتعديل</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      modal.querySelector('#fw-back').onclick  = () => modal.remove();
      modal.querySelector('#fw-save-anyway').onclick = () => {
        modal.remove();
        formBypassWarnings = true;
        submitSpaceForm();
      };
      modal.addEventListener('click', e => { if (e.target===modal) modal.remove(); });
      return;
    }
  }
  formBypassWarnings = false;

  const acts = getPickedValues('.act-pick', 'f-acts-custom');
  const amen = getPickedValues('.amen-pick', 'f-amen-custom');

  const ownerVal = get('f-owner');
  const isBroker = ownerVal === '__broker__';
  const spaceData = {
    ...(editingId?{id:editingId}:{}),
    ...(ownerVal && !isBroker ? {owner_id: ownerVal} : {owner_id: ''}),
    is_broker: isBroker,
    name, region,
    type:         get('f-type'),
    icon_emoji:   get('f-icon')||'🏪',
    thumb_color:  get('f-thumb'),
    sizes_prices: get('f-sizes'),
    min_price:    parseInt(get('f-price'))||0,
    all_acts:     document.getElementById('f-allacts')?.checked||false,
    activities:   acts,
    season:       get('f-season')||null,
    insight:      get('f-insight')||null,
    description:  get('f-desc')||null,
    amenities:    amen,
    sort_order:   parseInt(get('f-order'))||0,
    status:       get('f-status')||'live',
    image_url:    fMainImgUrl||null,
    extra_images: fExtraImgUrls.filter(Boolean),
  };

  setFormSaving(true);
  try {
    const result  = await sbRpc('admin_upsert_space',{p_data:spaceData});
    const spaceId = result.id || editingId;
    const unitRows = document.querySelectorAll('[id^="f-unit-"]');
    for (const row of unitRows) {
      const idx   = row.dataset.idx;
      const dbId  = row.dataset.dbId;
      const uid   = document.getElementById(`fu-uid-${idx}`)?.value.trim();
      const uname = document.getElementById(`fu-name-${idx}`)?.value.trim();
      if (!uid && !uname) continue;
      const unitData = {
        ...(dbId?{id:dbId}:{space_id:spaceId}),
        unit_id:  uid||('U-'+(parseInt(idx)+1)),
        name:     uname||null,
        floor:    document.getElementById(`fu-floor-${idx}`)?.value||null,
        size:     document.getElementById(`fu-size-${idx}`)?.value.trim()||null,
        price:    document.getElementById(`fu-price-${idx}`)?.value||null,
        status:   document.getElementById(`fu-status-${idx}`)?.value||'available',
        location: document.getElementById(`fu-loc-${idx}`)?.value.trim()||null,
        notes:    document.getElementById(`fu-notes-${idx}`)?.value.trim()||null,
        image_url: fUnitImgUrls[idx]||null,
      };
      await sbRpc('admin_upsert_unit',{p_data:unitData});
    }
    toast(editingId?'✅ تم حفظ التعديلات':'✅ تمت إضافة المساحة','s');
    showFormMsg('success', editingId?'تم حفظ التعديلات بنجاح!':'تمت إضافة المساحة بنجاح!');
    editingId = null;
    await loadAll();
    setTimeout(()=>gp('spaces',document.getElementById('sbi-spaces')), 700);
  } catch(e) {
    showFormMsg('error','خطأ: '+e.message);
  }
  setFormSaving(false);
}

function onOwnerSelectChange(sel) {
  const isBroker = sel.value === '__broker__';
  const isOwner  = sel.value && !isBroker;
  const note   = document.getElementById('f-owner-note');
  const behalf = document.getElementById('f-owner-behalf');
  if (note)   note.style.display   = isBroker ? 'block' : 'none';
  if (behalf) behalf.style.display = isOwner  ? 'flex'  : 'none';
}

function filterOwnerSelect(q) {
  const sel = document.getElementById('f-owner');
  if (!sel) return;
  const ql = q.toLowerCase().trim();
  Array.from(sel.options).forEach(opt => {
    if (!opt.value || opt.value === '__broker__') return;
    opt.hidden = ql ? !opt.text.toLowerCase().includes(ql) : false;
  });
}

/* ── Region helpers ── */
function getKnownRegions() {
  const fromSpaces = allSpaces.map(s=>s.region).filter(Boolean);
  return [...new Set([...REGION_PRESETS, ...fromSpaces])].sort((a,b)=>a.localeCompare(b,'ar'));
}

function checkRegionKnown(val) {
  const warn = document.getElementById('f-region-warn');
  if (!warn) return;
  const known = getKnownRegions();
  warn.style.display = (val.trim() && !known.includes(val.trim())) ? 'flex' : 'none';
}

/* ── Sizes/prices helpers ── */
function buildSizesPreviewHtml(val) {
  if (!val || !val.trim()) return '';
  return val.split(/[|·]/).map(e=>e.trim()).filter(Boolean).map(e => {
    if (!e.includes(':'))
      return `<span class="size-chip size-chip-err" title="يجب أن يحتوي على ':' بين الحجم والسعر">⚠ ${esc(e)}</span>`;
    const [sz, pr] = e.split(':');
    return `<span class="size-chip size-chip-ok">${esc(sz.trim())} <span style="opacity:.6">→</span> ${esc(pr.trim())} ج</span>`;
  }).join('');
}

function updateSizesPreview(val) {
  const prev = document.getElementById('f-sizes-preview');
  if (prev) prev.innerHTML = buildSizesPreviewHtml(val);
  /* live error border */
  const inp = document.getElementById('f-sizes');
  if (!inp || !val.trim()) { inp?.classList.remove('fc-err','fc-warn'); return; }
  const hasError = val.split(/[|·]/).map(e=>e.trim()).filter(Boolean).some(e=>!e.includes(':'));
  inp.classList.toggle('fc-err', hasError);
  inp.classList.toggle('fc-warn', false);
}

function insertSizeSep() {
  const inp = document.getElementById('f-sizes');
  if (!inp) return;
  const pos = inp.selectionStart;
  const v   = inp.value;
  inp.value = v.slice(0, pos) + ' · ' + v.slice(pos);
  inp.setSelectionRange(pos + 3, pos + 3);
  inp.focus();
  updateSizesPreview(inp.value);
}

/* ── Region merge modal ── */
function promptMergeRegion(oldRegion) {
  const existing = document.getElementById('merge-region-modal');
  if (existing) existing.remove();
  const affected = allSpaces.filter(s => s.region === oldRegion).length;
  const modal = document.createElement('div');
  modal.id = 'merge-region-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--bg3);border:1.5px solid rgba(245,158,11,.4);border-radius:var(--r2);padding:28px;max-width:420px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.7)">
      <div style="font-size:24px;text-align:center;margin-bottom:8px">🗺</div>
      <div style="font-size:15px;font-weight:800;text-align:center;margin-bottom:6px">دمج منطقة</div>
      <div style="font-size:12px;color:var(--mu);text-align:center;margin-bottom:16px">
        دمج <b style="color:var(--yw)">"${esc(oldRegion)}"</b> — <b>${affected}</b> مساحة ستُحدَّث
      </div>
      <div class="fg" style="margin-bottom:16px">
        <label class="fl">المنطقة الموحدة الجديدة</label>
        <input id="merge-region-inp" class="fc" list="merge-region-opts" placeholder="اختر من القائمة أو اكتب...">
        <datalist id="merge-region-opts">
          ${REGION_PRESETS.filter(r=>r!==oldRegion).map(r=>`<option value="${esc(r)}"></option>`).join('')}
        </datalist>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-neu" onclick="document.getElementById('merge-region-modal').remove()">إلغاء</button>
        <button class="btn btn-or" id="merge-ok-btn">دمج وتحديث ${affected} مساحة</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  const btn = modal.querySelector('#merge-ok-btn');
  btn.onclick = async () => {
    const newRegion = document.getElementById('merge-region-inp')?.value.trim();
    if (!newRegion || newRegion === oldRegion) { toast('اختر منطقة مختلفة','e'); return; }
    btn.disabled = true; btn.textContent = '⏳…';
    try {
      await sbTable('PATCH','spaces',{region:newRegion},`?region=eq.${encodeURIComponent(oldRegion)}`);
      modal.remove();
      await loadAll();
      renderActivities();
      toast(`✅ تم دمج "${oldRegion}" في "${newRegion}"`, 's');
    } catch(e) {
      btn.disabled = false; btn.textContent = `دمج وتحديث ${affected} مساحة`;
      toast('خطأ: '+e.message,'e');
    }
  };
  setTimeout(()=>modal.querySelector('#merge-region-inp')?.focus(), 50);
}

function setFormSaving(on) {
  const btn = document.querySelector('[onclick="submitSpaceForm()"]');
  if (btn) { btn.disabled = on; btn.innerHTML = on?'<span class="spin">⏳</span> جاري الحفظ…':`💾 ${editingId?'حفظ التعديلات':'إضافة المساحة'}`; }
}
function showFormMsg(type, text) {
  const el = document.getElementById('f-msg');
  if (!el) return;
  el.style.display = 'block';
  el.style.background = type==='success'?'rgba(34,197,94,.15)':'rgba(239,68,68,.15)';
  el.style.color       = type==='success'?'var(--gr)':'var(--rd)';
  el.style.border      = '1px solid '+(type==='success'?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)');
  el.textContent = text;
  setTimeout(()=>{ el.style.display='none'; }, 5000);
}

/* ═══════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════ */
function showConfirm(title, sub, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-sub').textContent   = sub;
  document.getElementById('confirm-ok').onclick        = ()=>{ closeConfirm(); cb(); };
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
}

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
function toast(msg, type='i') {
  const wrap = document.getElementById('toasts');
  if (!wrap) return;
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

function loading() { return `<div style="text-align:center;padding:60px;color:var(--mu)"><span class="spin" style="font-size:28px">⏳</span><div style="margin-top:12px;font-size:13px">جاري التحميل…</div></div>`; }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){ return d?new Date(d).toLocaleDateString('ar-EG',{day:'2-digit',month:'short',year:'numeric'}):'—'; }
function typeLabel(t) { return {mall:'🏬 مول',club:'⚽ نادي',school:'🏫 مدرسة',hotel:'🏨 فندق',other:'🏪 أخرى'}[t]||t||'—'; }
function statusLbl(s) { return {live:'✅ منشورة',paused:'⏸ موقوفة',hidden_by_admin:'🚫 مخفية',archived:'🗄 مؤرشفة'}[s]||s; }
function statusCls(s) { return {live:'b-approved',paused:'b-pending',hidden_by_admin:'b-rejected',archived:'b-hidden'}[s]||'b-hidden'; }
function planCls(p)   { return {starter:'b-starter',growth:'b-growth',pro:'b-pro'}[p]||'b-starter'; }
function planLbl(p)   { return {starter:'Starter',growth:'✓ Growth',pro:'🏆 Pro'}[p]||p||'Starter'; }
function unitStatusLbl(s){ return {available:'متاحة',rented:'مؤجّرة',reserved:'محجوزة',maintenance:'صيانة'}[s]||s; }

/* ═══════════════════════════════
   PAGE: ANNOUNCEMENTS LIST
═══════════════════════════════ */
function renderAnnouncements() {
  const today   = new Date().toISOString().split('T')[0];
  const visible = allAnnouncements.filter(a =>  a.is_active);
  const hidden  = allAnnouncements.filter(a => !a.is_active);
  const active  = visible.filter(a => a.submission_deadline >= today).length;
  const expired = visible.filter(a => a.submission_deadline <  today).length;

  annSelectedIds = new Set();

  function buildRows(list) {
    return list.map(a => {
      const isExpired = a.submission_deadline < today;
      const stBadge   = !a.is_active ? '<span class="badge b-hidden">مخفي</span>'
                      : isExpired    ? '<span class="badge b-rejected">منتهي</span>'
                      :                '<span class="badge b-approved">نشط</span>';
      const imgs   = Array.isArray(a.image_urls) && a.image_urls.length ? a.image_urls : (a.image_url ? [a.image_url] : []);
      const thumb  = imgs[0]
        ? `<div style="position:relative;display:inline-block">
             <img src="${esc(imgs[0])}" style="width:52px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--bd)" onerror="this.style.display='none'">
             ${imgs.length > 1 ? `<span style="position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;font-size:9px;border-radius:4px;padding:1px 4px">+${imgs.length-1}</span>` : ''}
           </div>`
        : `<div style="width:52px;height:40px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px">📄</div>`;
      const safeTitle = esc(a.title||'—');
      const chk = annSelectedIds.has(a.id) ? 'checked' : '';
      return `<tr id="ann-row-${a.id}">
        <td style="width:32px;text-align:center"><input type="checkbox" ${chk} onchange="toggleAnnSelect('${a.id}',this.checked)"></td>
        <td><div style="display:flex;gap:10px;align-items:center">${thumb}
          <div><div style="font-weight:700;font-size:12px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${safeTitle}</div>
          <div style="font-size:10px;color:var(--mu);margin-top:2px">${esc(a.source||'—')}</div></div></div></td>
        <td style="font-size:11px;max-width:120px">${esc(a.issuing_body||'—')}</td>
        <td><span class="badge b-broker" style="font-size:10px">${esc(a.announcement_type||'—')}</span></td>
        <td style="font-size:11px">${esc(a.governorate||'—')}</td>
        <td style="font-size:11px;font-family:'IBM Plex Mono',monospace;color:${isExpired?'var(--rd)':'var(--tx)'}">${a.submission_deadline||'—'}</td>
        <td>${stBadge}</td>
        <td><div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn-bl" onclick="openAnnForm('${a.id}')">✏️</button>
          <button class="btn ${a.is_active?'btn-yw':'btn-ok'}" title="${a.is_active?'إخفاء':'إظهار'}" onclick="toggleAnn('${a.id}',${!a.is_active})">${a.is_active?'⏸':'▶'}</button>
          <button class="btn btn-err" title="حذف نهائي + R2" onclick="deleteAnn('${a.id}','${safeTitle}')">🗑</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  const visibleTable = visible.length === 0 ? '' : `
    <div class="t-wrap"><table class="t">
      <thead><tr>
        <th style="width:32px"><input type="checkbox" id="ann-chk-all-vis" onchange="toggleAllAnnSection(this,'vis')"></th>
        <th>الإعلان</th><th>الجهة الناشرة</th><th>النوع</th><th>المحافظة</th>
        <th>آخر موعد</th><th>الحالة</th><th>إجراءات</th>
      </tr></thead>
      <tbody id="ann-tbody-vis">${buildRows(visible)}</tbody>
    </table></div>`;

  const hiddenTable = hidden.length === 0 ? '' : `
    <div style="margin-top:28px">
      <div style="font-size:13px;font-weight:800;color:var(--mu);margin-bottom:12px;display:flex;align-items:center;gap:8px">
        <span>👁️‍🗨️ إعلانات مخفية من المنصة</span>
        <span class="badge" style="background:rgba(100,100,120,.2);color:var(--mu)">${hidden.length}</span>
      </div>
      <div class="t-wrap"><table class="t" style="opacity:.8">
        <thead><tr>
          <th style="width:32px"><input type="checkbox" id="ann-chk-all-hid" onchange="toggleAllAnnSection(this,'hid')"></th>
          <th>الإعلان</th><th>الجهة الناشرة</th><th>النوع</th><th>المحافظة</th>
          <th>آخر موعد</th><th>الحالة</th><th>إجراءات</th>
        </tr></thead>
        <tbody id="ann-tbody-hid">${buildRows(hidden)}</tbody>
      </table></div>
    </div>`;

  const html = `
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
  <div>
    <div class="sec-title">الإعلانات الرسمية والمناقصات</div>
    <div class="sec-sub">تظهر مختلطة مع المساحات — الإعلانات المنتهية تظل مرئية حتى تُخفيها يدوياً</div>
  </div>
  <button class="tbtn tbtn-primary" onclick="openAnnForm()">+ إعلان جديد</button>
</div>

<!-- شريط الإجراءات الجماعية -->
<div id="ann-bulk-bar" style="display:none;background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.3);border-radius:10px;padding:10px 16px;margin-bottom:16px;display:none;align-items:center;gap:10px;flex-wrap:wrap">
  <span id="ann-bulk-count" style="font-size:13px;font-weight:800;color:var(--or)">0 محدد</span>
  <button class="btn btn-yw" style="font-size:12px" onclick="bulkHideAnn()">⏸ إخفاء من المنصة</button>
  <button class="btn btn-ok" style="font-size:12px" onclick="bulkRestoreAnn()">▶ إعادة النشر</button>
  <button class="btn btn-err" style="font-size:12px" onclick="bulkDeleteAnn()">🗑 حذف نهائي</button>
  <button class="btn btn-neu" style="font-size:12px;margin-right:auto" onclick="clearAnnSelection()">✕ إلغاء التحديد</button>
</div>

<div class="stats-bar" style="margin-bottom:20px">
  <div class="stat-chip"><span class="stat-num" style="color:var(--gr)">${active}</span> نشط</div>
  <div class="stat-chip"><span class="stat-num" style="color:var(--or)">${expired}</span> منتهي لكن مرئي</div>
  <div class="stat-chip"><span class="stat-num" style="color:var(--mu)">${hidden.length}</span> مخفي</div>
  <div class="stat-chip"><span class="stat-num">${allAnnouncements.length}</span> الإجمالي</div>
</div>

${allAnnouncements.length === 0
  ? `<div class="empty-state"><div class="empty-ico">📢</div><div class="empty-title">لا توجد إعلانات بعد</div>
     <button class="btn btn-or" style="margin-top:14px" onclick="openAnnForm()">+ أضف إعلاناً الآن</button></div>`
  : visibleTable + hiddenTable}`;

  setPageContent('announcements', html);
}

function toggleAnnSelect(id, checked) {
  if (checked) annSelectedIds.add(id); else annSelectedIds.delete(id);
  _syncAnnBulkBar();
}

function toggleAllAnnSection(chkEl, section) {
  const tbody = document.getElementById(`ann-tbody-${section}`);
  if (!tbody) return;
  tbody.querySelectorAll('input[type=checkbox]').forEach(c => {
    c.checked = chkEl.checked;
    const rowId = c.closest('tr')?.id?.replace('ann-row-','');
    if (rowId) { if (chkEl.checked) annSelectedIds.add(rowId); else annSelectedIds.delete(rowId); }
  });
  _syncAnnBulkBar();
}

function clearAnnSelection() {
  annSelectedIds.clear();
  document.querySelectorAll('#pg-announcements input[type=checkbox]').forEach(c => c.checked = false);
  _syncAnnBulkBar();
}

function _syncAnnBulkBar() {
  const bar   = document.getElementById('ann-bulk-bar');
  const count = document.getElementById('ann-bulk-count');
  const n     = annSelectedIds.size;
  if (bar)   bar.style.display   = n > 0 ? 'flex' : 'none';
  if (count) count.textContent   = `${n} ${n === 1 ? 'إعلان محدد' : 'إعلانات محددة'}`;
}

async function bulkHideAnn() {
  const ids = [...annSelectedIds];
  if (!ids.length) return;
  if (!confirm(`إخفاء ${ids.length} إعلان من المنصة؟ يمكن إعادة نشرها لاحقاً.`)) return;
  try {
    await Promise.all(ids.map(id => sbRpc('admin_toggle_announcement', { p_id: id, p_active: false })));
    ids.forEach(id => { const a = allAnnouncements.find(x => x.id === id); if (a) a.is_active = false; });
    toast(`⏸ تم إخفاء ${ids.length} إعلان`, 's');
    renderAnnouncements();
  } catch(e) { toast('خطأ: ' + e.message, 'e'); }
}

async function bulkRestoreAnn() {
  const ids = [...annSelectedIds];
  if (!ids.length) return;
  try {
    await Promise.all(ids.map(id => sbRpc('admin_toggle_announcement', { p_id: id, p_active: true })));
    ids.forEach(id => { const a = allAnnouncements.find(x => x.id === id); if (a) a.is_active = true; });
    toast(`▶ تم إعادة نشر ${ids.length} إعلان`, 's');
    renderAnnouncements();
  } catch(e) { toast('خطأ: ' + e.message, 'e'); }
}

async function bulkDeleteAnn() {
  const ids = [...annSelectedIds];
  if (!ids.length) return;
  showConfirm(
    `حذف ${ids.length} إعلان نهائياً`,
    `سيتم حذف ${ids.length} إعلان من قاعدة البيانات وصورها من التخزين. لا يمكن التراجع.`,
    async () => {
      let ok = 0, fail = 0;
      await Promise.all(ids.map(async id => {
        try {
          await _deleteAnnWithR2(id);
          allAnnouncements = allAnnouncements.filter(a => a.id !== id);
          ok++;
        } catch { fail++; }
      }));
      toast(fail ? `تم حذف ${ok} / فشل ${fail}` : `🗑 تم حذف ${ok} إعلان`, fail ? 'w' : 's');
      renderAnnouncements();
    }
  );
}

  </div>`;
}

/* ── رفع صورة لـ slot معين ── */
async function handleAnnImgSlot(inp, idx) {
  const file = inp.files?.[0];
  if (!file) return;
  inp.value = '';
  const slot = document.getElementById(`ann-slot-${idx}`);
  const prog = document.getElementById(`ann-slot-prog-${idx}`);
  if (prog) prog.style.display = '';
  if (slot) slot.style.borderColor = 'var(--or)';
  try {
    const year   = new Date().getFullYear();
    const folder = `official-listings/${year}/${annEditingId || 'new'}`;
    const [url]  = await uploadImages([file], folder, null, SB_KEY);
    annImgUrls[idx] = url;
    const container = document.getElementById('ann-img-slots');
    if (slot && container) slot.outerHTML = _buildAnnSlotHtml(idx, url);
  } catch(e) {
    if (prog) prog.style.display = 'none';
    if (slot) slot.style.borderColor = 'var(--rd)';
    toast('❌ فشل رفع الصورة: ' + e.message, 'e');
  }
}

/* ── مسح صورة slot ── */
function clearAnnImgSlot(idx) {
  annImgUrls[idx] = null;
  const slot = document.getElementById(`ann-slot-${idx}`);
  if (slot) slot.outerHTML = _buildAnnSlotHtml(idx, null);
}

async function saveAnn() {
  const btn      = document.getElementById('ann-save-btn');
  const title    = (document.getElementById('ann-title')?.value || '').trim();
  const issuer   = (document.getElementById('ann-issuer')?.value || '').trim();
  const type     = document.getElementById('ann-type')?.value || '';
  const classVal = document.getElementById('ann-class')?.value || '';
  const classOth = (document.getElementById('ann-class-other')?.value || '').trim();
  const gov      = document.getElementById('ann-gov')?.value || '';
  const deadline = document.getElementById('ann-deadline')?.value || '';
  const pubDate  = document.getElementById('ann-pub-date')?.value || new Date().toISOString().split('T')[0];

  if (!title)    { showAnnMsg('error','⚠️ عنوان الإعلان مطلوب');    return; }
  if (!issuer)   { showAnnMsg('error','⚠️ الجهة الناشرة مطلوبة');   return; }
  if (!classVal) { showAnnMsg('error','⚠️ التصنيف مطلوب');          return; }
  if (!gov)      { showAnnMsg('error','⚠️ المحافظة مطلوبة');        return; }
  if (!deadline) { showAnnMsg('error','⚠️ آخر موعد التقديم مطلوب'); return; }

  const finalClass  = classVal === 'أخرى' ? (classOth || 'أخرى') : classVal;
  const rawPrice    = document.getElementById('ann-doc-price')?.value;
  const validUrls   = annImgUrls.filter(Boolean);
  const payload = {
    title,
    image_url:            validUrls[0] || null,
    image_urls:           validUrls,
    issuing_body:         issuer,
    announcement_type:    type,
    classification:       finalClass,
    classification_other: classVal === 'أخرى' ? classOth : null,
    governorate:          gov,
    source:               (document.getElementById('ann-source')?.value || '').trim() || null,
    published_at:         pubDate,
    submission_deadline:  deadline,
    session_date:         document.getElementById('ann-session-date')?.value || null,
    session_time:         (document.getElementById('ann-session-time')?.value || '').trim() || null,
    document_price:       rawPrice ? parseFloat(rawPrice) : null,
    insurance_value:      (document.getElementById('ann-insurance')?.value || '').trim() || 'غير محدد',
    description:          (document.getElementById('ann-desc')?.value || '').trim() || null,
    is_active:            document.getElementById('ann-is-active')?.checked ?? true,
    place_type:           document.getElementById('ann-place-type')?.value    || null,
    activity_type:        document.getElementById('ann-activity-type')?.value || null,
  };
  if (annEditingId) payload.id = annEditingId;

  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin">⏳</span> جاري الحفظ…'; }
  try {
    await sbRpc('admin_upsert_announcement', { p_data: payload });
    toast(`✅ تم ${annEditingId ? 'تعديل' : 'إضافة'} الإعلان بنجاح`, 's');
    await loadAll();
    gp('announcements', document.getElementById('sbi-announcements'));
  } catch(e) {
    showAnnMsg('error', '❌ خطأ: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = `💾 ${annEditingId ? 'حفظ التعديلات' : 'إضافة الإعلان'}`; }
  }
}

function showAnnMsg(type, text) {
  const el = document.getElementById('ann-form-msg');
  if (!el) return;
  el.style.display    = 'block';
  el.style.background = type === 'error' ? 'rgba(239,68,68,.15)' : 'rgba(34,197,94,.15)';
  el.style.color      = type === 'error' ? 'var(--rd)' : 'var(--gr)';
  el.style.border     = `1px solid ${type === 'error' ? 'rgba(239,68,68,.3)' : 'rgba(34,197,94,.3)'}`;
  el.textContent = text;
}

async function toggleAnn(id, newActive) {
  try {
    await sbRpc('admin_toggle_announcement', { p_id: id, p_active: newActive });
    toast(newActive ? '▶ تم إظهار الإعلان' : '⏸ تم إخفاء الإعلان', 's');
    allAnnouncements = allAnnouncements.map(a => a.id === id ? Object.assign({}, a, {is_active: newActive}) : a);
    renderAnnouncements();
  } catch(e) { toast('خطأ: ' + e.message, 'e'); }
}

/* حذف إعلان واحد من R2 + Supabase عبر Pages Function */
async function _deleteAnnWithR2(id) {
  const res = await fetch('/admin/delete-announcement', {
    method:  'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ id, p_secret: adminHash }),
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.error || `HTTP ${res.status}`);
  }
}

async function deleteAnn(id, title) {
  showConfirm(
    'حذف الإعلان نهائياً',
    `سيتم حذف "${title}" من قاعدة البيانات وصوره من التخزين. لا يمكن التراجع.`,
    async () => {
      try {
        await _deleteAnnWithR2(id);
        toast('🗑 تم حذف الإعلان وصوره', 's');
        allAnnouncements = allAnnouncements.filter(a => a.id !== id);
        renderAnnouncements();
      } catch(e) { toast('خطأ: ' + e.message, 'e'); }
    }
  );
}
