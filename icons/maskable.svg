  <rect width="512" height="512" fill="#0C0C0C"/>
  <!-- دائرة خلفية برتقالية خفيفة -->
  <circle cx="256" cy="256" r="200" fill="rgba(255,107,0,0.08)"/>
  <!-- دبوس الموقع — أصغر ليبقى داخل الـ safe zone (80% من المنتصف) -->
