       C192 260 240 318 252 333
       C254 336 258 336 260 333
       C272 318 320 260 320 220
       C320 184 292 156 256 156 Z"/>
  <circle cx="256" cy="220" r="36" fill="#0C0C0C"/>
  <circle cx="256" cy="220" r="14" fill="#FF6B00"/>
</svg>
