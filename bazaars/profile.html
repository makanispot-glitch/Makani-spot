<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الملف الشخصي — مكاني Spot</title>
<link rel="icon" type="image/jpeg" href="/favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=27">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<style>
/* ══════════════════════════════════════════════════
   NAV
══════════════════════════════════════════════════ */
.bz-standalone-nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(250,250,247,0.96); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; box-shadow: var(--shadow);
}
.bz-nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.bz-nav-logo .logo-ar { font-size: 20px; font-weight: 900; font-family: var(--font-display); color: var(--dark); }
.bz-nav-logo .logo-en { font-size: 13px; font-weight: 700; font-family: var(--font-display); color: var(--orange); }
.bz-nav-title {
  font-size: 13px; font-weight: 700; font-family: var(--font-display); color: var(--ink2);
  padding: 4px 12px; background: var(--orange-ultra); border-radius: var(--radius-pill);
}
.bz-nav-right { display: flex; align-items: center; gap: 12px; }
.bz-nav-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 700; font-family: var(--font-display); color: var(--ink2); text-decoration: none;
  transition: color var(--dur-fast) var(--ease-out);
}
.bz-nav-back:hover { color: var(--orange); }
@media (max-width: 640px) {
  .bz-standalone-nav { padding: 0 16px; height: 58px; }
  .bz-nav-title { display: none; }
}

/* ══════════════════════════════════════════════════
   PAGE LAYOUT
══════════════════════════════════════════════════ */
.op-page { min-height: 100vh; background: var(--bg, #F9FAFB); padding-bottom: 80px; }
.op-content { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

/* ══════════════════════════════════════════════════
   HERO CARD
══════════════════════════════════════════════════ */
.op-hero {
  background: linear-gradient(135deg, #fff 0%, #fffbf5 100%);
  border-radius: var(--radius-2xl); border: 1px solid var(--border);
  padding: 26px 28px 20px; margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.op-hero-top { display: flex; align-items: flex-start; gap: 18px; flex-wrap: wrap; }
.op-avatar-wrap { position: relative; flex-shrink: 0; }
.op-avatar {
  width: 88px; height: 88px; border-radius: 50%;
  background: var(--orange); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; font-weight: 900; overflow: hidden;
  border: 3px solid #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  cursor: pointer;
}
.op-avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar-edit-btn {
  position: absolute; bottom: 2px; right: 2px;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--orange); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; border: 2px solid #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.15);
}
.op-hero-info { flex: 1; min-width: 0; }
.op-name {
  font-size: 21px; font-weight: 900; color: var(--dark);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px;
}
.op-hero-meta {
  font-size: 12px; color: var(--ink3); display: flex; flex-wrap: wrap;
  gap: 10px; margin-bottom: 12px; margin-top: 4px;
}
.op-hero-meta span { display: flex; align-items: center; gap: 4px; }
.op-hero-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

/* Quick nav strip */
.op-quick-nav {
  display: flex; gap: 8px; margin-top: 14px; padding-top: 14px;
  border-top: 1.5px solid var(--border); flex-wrap: wrap;
}
.op-qn-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 700; text-decoration: none;
  background: var(--surface2); color: var(--ink2);
  border: 1.5px solid var(--border); transition: all var(--dur-fast) var(--ease-out);
  font-family: var(--font-display); cursor: pointer;
}
.op-qn-btn:hover { background: var(--orange-ultra); border-color: var(--orange); color: var(--orange); }
.op-qn-btn:focus-visible { outline: none; box-shadow: var(--ring-focus); }
.op-qn-btn.primary { background: linear-gradient(180deg, #F47432 0%, #F36418 100%); box-shadow: 0 1px 0 rgba(255,255,255,0.20) inset; color: #fff; border-color: transparent; }
.op-qn-btn.primary:hover { opacity: .9; }

/* ══════════════════════════════════════════════════
   PRIMARY BADGES  (منظم / صاحب مساحة) — بارزة
══════════════════════════════════════════════════ */
.op-primary-badges {
  display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0 6px;
}
.op-badge-primary {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-radius: 14px; cursor: default;
}
.op-badge-primary.organizer {
  background: linear-gradient(135deg, #fff7ed, #ffedd5);
  border: 1.5px solid rgba(243,100,24,0.35);
}
.op-badge-primary.space-owner {
  background: linear-gradient(135deg, #eff6ff, #dbeafe);
  border: 1.5px solid rgba(59,130,246,0.35);
}
.op-badge-icon { font-size: 24px; flex-shrink: 0; }
.op-badge-label { font-size: 13px; font-weight: 900; color: var(--dark); }
.op-badge-desc  { font-size: 11px; color: var(--ink3); margin-top: 1px; }

/* Secondary Badges */
.op-sec-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.op-sec-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  background: var(--surface2); color: var(--ink2);
  border: 1px solid var(--border);
}
.op-sec-badge.gold { background: #fffbeb; color: #92400e; border-color: #fcd34d; }

/* ══════════════════════════════════════════════════
   CTA CARDS  (تقدّم كمنظم / صاحب مساحة)
══════════════════════════════════════════════════ */
.op-cta-wrap {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 14px; padding-top: 14px; border-top: 1.5px solid var(--border);
}
.op-cta-card {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; border-radius: var(--radius-xl); text-decoration: none;
  background: var(--orange-ultra); border: 1.5px solid rgba(243,100,24,0.2);
  transition: all var(--dur-base) var(--ease-out);
}
.op-cta-card.blue { background: #eff6ff; border-color: rgba(59,130,246,.25); }
.op-cta-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.op-cta-emoji { font-size: 22px; flex-shrink: 0; }
.op-cta-body  { flex: 1; min-width: 0; }
.op-cta-title { font-size: 12px; font-weight: 900; color: var(--dark); }
.op-cta-desc  { font-size: 11px; color: var(--ink3); line-height: 1.4; margin-top: 2px; }
.op-cta-arrow { font-size: 13px; font-weight: 900; color: var(--orange); flex-shrink: 0; }
.op-cta-card.blue .op-cta-arrow { color: #3b82f6; }

/* ══════════════════════════════════════════════════
   STATS GRID
══════════════════════════════════════════════════ */
.op-stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 16px;
}
.op-stat-card {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border); padding: 16px 12px; text-align: center;
  box-shadow: var(--shadow-xs);
}
.op-stat-num { font-size: 24px; font-weight: 900; color: var(--orange); line-height: 1.1; }
.op-stat-lbl { font-size: 11px; color: var(--ink3); margin-top: 5px; font-weight: 600; line-height: 1.4; }
.op-stat-note { font-size: 9px; color: var(--ink3); opacity: .7; margin-top: 3px; }

/* ══════════════════════════════════════════════════
   TWO-COLUMN LAYOUT
══════════════════════════════════════════════════ */
.op-two-col {
  display: grid; grid-template-columns: 300px 1fr;
  gap: 16px; align-items: start;
}

/* ══════════════════════════════════════════════════
   SECTION CARDS
══════════════════════════════════════════════════ */
.op-section-card {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border); padding: 20px;
  box-shadow: var(--shadow-xs);
}
.op-section-title {
  font-size: 14px; font-weight: 900; color: var(--dark);
  margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 10px; border-bottom: 1.5px solid var(--border);
}
.op-section-title a {
  font-size: 12px; font-weight: 700; color: var(--orange); text-decoration: none;
}
.op-section-title a:hover { text-decoration: underline; }

/* Personal data rows */
.op-data-row {
  display: flex; flex-direction: column; gap: 2px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.op-data-row:last-child { border-bottom: none; }
.op-data-lbl { font-size: 10px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing:.3px; }
.op-data-val { font-size: 13px; color: var(--dark); font-weight: 700; }
.op-data-synced { font-size: 9px; color: var(--orange); font-weight: 600; opacity: .7; }

/* ══════════════════════════════════════════════════
   LISTINGS GRID
══════════════════════════════════════════════════ */
.op-listing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.op-listing-card {
  border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border);
  background: var(--surface2); cursor: pointer; transition: box-shadow var(--dur-fast) var(--ease-out);
}
.op-listing-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.09); }
.op-listing-img {
  width: 100%; height: 78px;
  background: var(--surface2); overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.op-listing-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.op-listing-info { padding: 8px 10px; }
.op-listing-title {
  font-size: 12px; font-weight: 800; color: var(--dark); line-height: 1.3;
  margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.op-listing-meta { display: flex; align-items: center; justify-content: space-between; }
.op-listing-price { font-size: 12px; font-weight: 900; color: var(--orange); }
.op-listing-status {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  background: #e8f5e9; color: #2e7d32;
}
.op-listing-status.expired { background: #fef2f2; color: #dc2626; }
.op-listing-status.sold    { background: #fffbeb; color: #d97706; }
.op-listing-status.pending { background: #f0f9ff; color: #0369a1; }

/* ══════════════════════════════════════════════════
   BADGE STYLES (في الاسم)
══════════════════════════════════════════════════ */
.op-verified-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
  color: #2e7d32; border: 1.5px solid #81c784;
  font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 50px;
}
.op-pending-badge {
  background: #fffbeb; color: #d97706; border: 1.5px solid #fcd34d;
  font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 50px;
  display: inline-flex; align-items: center; gap: 4px;
}
.op-unverified-badge {
  background: var(--surface2); color: var(--ink3);
  border: 1.5px solid var(--border);
  font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 50px;
  display: inline-flex; align-items: center; gap: 4px;
}

/* WhatsApp */
.op-wa-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-pill);
  background: #25D366; color: #fff; text-decoration: none;
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  transition: opacity var(--dur-fast) var(--ease-out);
}
.op-wa-btn:hover { opacity: .9; }

/* Bazaar items */
.op-bazaar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .15s;
}
.op-bazaar-item:last-child { border-bottom: none; }
.op-bazaar-item:hover { background: var(--surface2); margin: 0 -10px; padding: 10px 10px; border-radius: 8px; }

/* Empty / Loading */
.op-empty { text-align: center; padding: 28px 16px; color: var(--ink3); font-size: 13px; }
.op-loading { text-align: center; padding: 80px 20px; color: var(--ink3); }

/* Reviews */
.op-review-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.op-review-item:last-child { border-bottom: none; }

/* ══════════════════════════════════════════════════
   RATE PARTICIPANTS  (المنظم → المشارك)
══════════════════════════════════════════════════ */
.op-rate-count {
  font-size: 11px; font-weight: 800; color: var(--orange);
  background: var(--orange-ultra); padding: 3px 10px; border-radius: 20px;
}
.op-rate-intro {
  font-size: 12.5px; color: var(--ink3); line-height: 1.8;
  margin: 0 0 16px; padding: 11px 14px;
  background: var(--orange-ultra); border-radius: var(--radius-lg);
  border: 1px solid rgba(243,100,24,0.15);
}
.op-rate-intro strong { color: var(--orange); }
.op-rate-form { display: flex; flex-direction: column; gap: 14px; }
.op-rate-context {
  font-size: 12px; font-weight: 700; color: var(--ink2);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 8px 12px; display: none;
}
.op-rate-criteria { display: flex; flex-direction: column; gap: 10px; }
.op-rate-crit {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 10px 14px;
}
.op-rate-crit-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.op-rate-crit-label { font-size: 13px; font-weight: 700; color: var(--dark); }
.op-rate-crit-val { font-size: 13px; font-weight: 900; color: var(--orange); min-width: 18px; text-align: left; }
.op-star-input { display: inline-flex; gap: 3px; }
.op-si-star {
  background: none; border: none; cursor: pointer; padding: 0 1px;
  font-size: 23px; line-height: 1; color: #d4d4d8;
  transition: transform .12s ease, color .12s ease; font-family: inherit;
}
.op-si-star.on { color: #f59e0b; }
.op-si-star:hover { transform: scale(1.18); color: #fbbf24; }
.op-rate-avg-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; font-weight: 700; color: var(--ink2);
  padding: 8px 14px; background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius-md);
}
.op-rate-avg-row strong { font-size: 18px; color: #d97706; }
.op-rate-notes {
  width: 100%; box-sizing: border-box; resize: vertical;
  padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-md); font-family: var(--font-body);
  font-size: 13px; color: var(--ink); background: var(--surface2);
  outline: none; transition: border-color var(--dur-fast) var(--ease-out);
}
.op-rate-notes:focus { border-color: var(--orange); box-shadow: var(--ring-focus); }
.op-rate-msg { font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: var(--radius-md); }
.op-rate-msg.success { background: #ecfdf5; color: #047857; border: 1px solid #6ee7b7; }
.op-rate-msg.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.op-rate-submit {
  align-self: flex-start;
  background: linear-gradient(180deg, #F47432 0%, #F36418 100%);
  color: #fff; border: none; border-radius: var(--radius-pill);
  font-family: var(--font-display); font-size: 14px; font-weight: 800;
  padding: 11px 28px; cursor: pointer; box-shadow: 0 2px 8px rgba(243,100,24,.25);
  transition: opacity var(--dur-fast) var(--ease-out);
}
.op-rate-submit:hover:not(:disabled) { opacity: .92; }
.op-rate-submit:disabled { opacity: .6; cursor: default; }
.op-rate-history { margin-top: 20px; padding-top: 16px; border-top: 1.5px solid var(--border); }
.op-rate-history-title { font-size: 13px; font-weight: 900; color: var(--dark); margin-bottom: 12px; }
.op-rate-hrow { padding: 11px 0; border-bottom: 1px solid var(--border); }
.op-rate-hrow:last-child { border-bottom: none; }
.op-rate-hrow-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.op-rate-hrow-who { font-size: 13px; font-weight: 800; color: var(--dark); }
.op-rate-hrow-stars { font-size: 12px; }
.op-rate-hrow-meta { font-size: 11px; color: var(--ink3); }
.op-rate-hrow-note {
  font-size: 12.5px; color: var(--ink2); line-height: 1.6; margin-top: 5px;
  background: var(--surface2); padding: 7px 11px; border-radius: 8px; border-right: 3px solid var(--orange);
}

/* ══════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════ */
.op-modal {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity var(--dur-base) var(--ease-out);
  background: rgba(14,18,24,0.65); backdrop-filter: blur(6px);
  padding: 20px;
}
.op-modal.open { opacity: 1; pointer-events: auto; }
.op-modal-card {
  background: var(--surface); border-radius: var(--radius-2xl); border: 1px solid var(--border);
  box-shadow: var(--shadow-xl); width: 100%; max-width: 480px;
  transform: scale(0.95); transition: transform var(--dur-base) var(--ease-out);
  max-height: 90vh; display: flex; flex-direction: column;
}
.op-modal.open .op-modal-card { transform: scale(1); }
.op-modal-header {
  padding: 16px 24px; border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.op-modal-title { font-size: 16px; font-weight: 900; color: var(--dark); }
.op-modal-close { font-size: 22px; cursor: pointer; color: var(--ink3); background: none; border: none; font-family: Cairo; }
.op-modal-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex: 1; }
.op-modal-footer {
  padding: 14px 24px; border-top: 1.5px solid var(--border); background: var(--surface2);
  display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0;
}
.op-modal-section-label {
  font-size: 10px; font-weight: 800; color: var(--ink3); text-transform: uppercase;
  letter-spacing: .5px; border-bottom: 1px solid var(--border);
  padding-bottom: 5px; margin-top: 4px;
}
.vr-fg { display: flex; flex-direction: column; gap: 5px; }
.vr-fg label { font-size: 12px; font-weight: 700; font-family: var(--font-display); color: var(--ink2); }
.vr-fg input, .vr-fg select {
  padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-md); font-family: var(--font-body);
  font-size: 14px; color: var(--ink); background: var(--surface2);
  outline: none; transition: border-color var(--dur-fast) var(--ease-out); width: 100%; box-sizing: border-box;
}
.vr-fg input:focus, .vr-fg select:focus { border-color: var(--orange); box-shadow: var(--ring-focus); }

/* ══════════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .op-stats-grid { grid-template-columns: repeat(2, 1fr); }
  .op-two-col { grid-template-columns: 1fr; }
}
@media (max-width: 500px) {
  .op-hero { padding: 18px 16px 14px; }
  .op-hero-top { gap: 12px; }
  .op-avatar { width: 72px; height: 72px; font-size: 26px; }
  .op-name { font-size: 17px; }
  .op-listing-grid { grid-template-columns: 1fr; }
  .op-cta-wrap { grid-template-columns: 1fr; }
  .op-primary-badges { flex-direction: column; }
  .op-content { padding: 14px 12px; }
}
</style>

<body>

<!-- ── Nav ── -->
<nav class="bz-standalone-nav">
  <a class="bz-nav-logo" href="/">
    <div class="logo-text">
      <span class="logo-ar">مكاني</span>
      <span class="logo-en">Spot</span>
    </div>
    <span class="bz-nav-title">👤 الملف الشخصي</span>

<!-- ── المحتوى ── -->
<div class="op-page">
  <div class="op-content" id="op-content">
    <div class="op-loading">
      <div style="font-size:36px;margin-bottom:12px;display:inline-block;animation:spin 1s linear infinite">⏳</div>
      <div style="font-size:14px">جاري تحميل الملف الشخصي…</div>
    </div>
  </div>
</div>

<!-- ── Edit Modal ── -->
<div class="op-modal" id="edit-profile-modal">
  <div class="op-modal-card">
    <div class="op-modal-header">
      <span class="op-modal-title">✍️ تعديل بيانات الحساب</span>
      <button class="op-modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="op-modal-body">

      <div class="op-modal-section-label">البيانات الشخصية</div>
      <div class="vr-fg">
        <label>الاسم الكامل *</label>
        <input type="text" id="edit-name" placeholder="اسمك الكريم">
      </div>
      <div class="vr-fg">
        <label>رقم الموبايل</label>
        <input type="tel" id="edit-phone" placeholder="01xxxxxxxxx" dir="ltr">
      </div>
      <div class="vr-fg">
        <label>المدينة</label>
        <select id="edit-city">
          <option value="">اختر مدينتك</option>
          <option>القاهرة</option>
          <option>الجيزة</option>
          <option>الإسكندرية</option>
          <option>المنصورة</option>
          <option>أسيوط</option>
          <option>طنطا</option>
          <option>الشرقية</option>
          <option>بورسعيد</option>
          <option>أخرى</option>
        </select>
      </div>

      <div class="op-modal-section-label" style="margin-top:6px">بيانات المنظّم (إن وُجدت)</div>
      <div class="vr-fg">
        <label>رقم الواتساب</label>
        <input type="tel" id="edit-whatsapp" placeholder="01xxxxxxxxx" dir="ltr">
      </div>
      <div class="vr-fg">
        <label>المنطقة / المحافظة</label>
        <input type="text" id="edit-region" placeholder="مثال: التجمع الخامس، القاهرة">
      </div>

      <div class="op-modal-section-label" style="margin-top:6px">تغيير كلمة المرور</div>
      <div class="vr-fg">
        <label>كلمة المرور الجديدة <span style="font-size:10px;opacity:.5;font-weight:400">(اتركها فارغة إن لم تريد التغيير)</span></label>
        <input type="password" id="edit-password" placeholder="٨ أحرف على الأقل" dir="ltr" autocomplete="new-password">
      </div>
      <div class="vr-fg">
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="edit-password-confirm" placeholder="أعد كتابة كلمة المرور" dir="ltr" autocomplete="new-password">
      </div>

      <div id="edit-error" style="display:none;font-size:12px;color:#EF4444;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:8px 12px"></div>
    </div>
    <div class="op-modal-footer">
      <button class="btn" style="padding:8px 18px;border-radius:50px;font-size:13px" onclick="closeEditModal()">إلغاء</button>
      <button class="btn btn-primary" style="padding:8px 22px;border-radius:50px;font-size:13px" id="edit-save-btn" onclick="saveProfileDetails()">حفظ التعديلات</button>
    </div>
  </div>
</div>

<!-- hidden file input -->
<input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="uploadAvatarImage(this)">

<script src="/media-handler.js" defer></script>
<script src="profile.js?v=202606112252" defer></script>
</body>
</html>
