<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الملف الشخصي — مكاني Spot</title>
<link rel="icon" type="image/jpeg" href="/favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<style>
/* ── Standalone Nav ── */
.bz-standalone-nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,0.97); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; box-shadow: var(--shadow);
}
.bz-nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.bz-nav-logo .logo-ar { font-size: 20px; font-weight: 900; color: var(--dark); }
.bz-nav-logo .logo-en { font-size: 13px; font-weight: 700; color: var(--orange); }
.bz-nav-title {
  font-size: 13px; font-weight: 700; color: var(--ink2);
  padding: 4px 12px; background: var(--orange-ultra); border-radius: 20px;
}
.bz-nav-right { display: flex; align-items: center; gap: 12px; }
.bz-nav-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 50px;
  font-size: 13px; font-weight: 700; color: var(--ink2); text-decoration: none;
  transition: color .2s;
}
.bz-nav-back:hover { color: var(--orange); }
@media (max-width: 640px) {
  .bz-standalone-nav { padding: 0 16px; height: 58px; }
  .bz-nav-title { display: none; }
}

/* ── بروفايل ── */
.op-page { min-height: 100vh; background: var(--bg, #F9FAFB); padding-bottom: 80px; }
.op-content { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

/* بطاقة الهوية */
.op-identity-card {
  background: var(--surface); border-radius: 20px;
  border: 1px solid var(--border); padding: 28px;
  display: flex; align-items: flex-start; gap: 20px;
  margin-bottom: 20px; box-shadow: var(--shadow);
}
.op-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--orange); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 900; flex-shrink: 0; overflow: hidden;
}
.op-avatar img { width: 100%; height: 100%; object-fit: cover; }
.op-identity-info { flex: 1; min-width: 0; }
.op-name {
  font-size: 22px; font-weight: 900; color: var(--dark);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px;
}
.op-meta { font-size: 13px; color: var(--ink2); display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.op-meta span { display: flex; align-items: center; gap: 4px; }
.op-wa-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 50px;
  background: #25D366; color: #fff; text-decoration: none;
  font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
  margin-top: 12px; transition: opacity .2s;
}
.op-wa-btn:hover { opacity: .9; }

/* شارة التوثيق */
.op-verified-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
  color: #2e7d32; border: 1.5px solid #81c784;
  font-size: 13px; font-weight: 800; padding: 5px 12px; border-radius: 50px;
}
.op-pending-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: #fffbeb; color: #d97706;
  border: 1.5px solid #fcd34d;
  font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 50px;
}
.op-unverified-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface2); color: var(--ink3);
  border: 1.5px solid var(--border);
  font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 50px;
}

/* CTA: تنظيم بازار */
.op-organize-cta {
  background: linear-gradient(135deg, #fff7ed, #ffedd5);
  border: 2px solid var(--orange); border-radius: 16px;
  padding: 28px; margin-bottom: 20px; text-align: center;
}
.op-organize-cta h3 { font-size: 18px; font-weight: 900; color: var(--dark); margin-bottom: 8px; }
.op-organize-cta p { font-size: 14px; color: var(--ink2); margin-bottom: 20px; line-height: 1.7; }

/* إحصائيات */
.op-stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px;
}
.op-stat-card {
  background: var(--surface); border-radius: 14px;
  border: 1px solid var(--border); padding: 20px; text-align: center;
}
.op-stat-num { font-size: 28px; font-weight: 900; color: var(--orange); }
.op-stat-lbl { font-size: 12px; color: var(--ink3); margin-top: 4px; font-weight: 600; }

/* بطاقات الأقسام */
.op-section-card {
  background: var(--surface); border-radius: 16px;
  border: 1px solid var(--border); padding: 22px; margin-bottom: 20px;
}
.op-section-title {
  font-size: 16px; font-weight: 900; color: var(--dark);
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  padding-bottom: 12px; border-bottom: 1.5px solid var(--border);
}
.op-bazaar-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .15s;
}
.op-bazaar-item:last-child { border-bottom: none; }
.op-bazaar-item:hover { background: var(--surface2); margin: 0 -12px; padding: 12px 12px; border-radius: 8px; }
.op-empty { text-align: center; padding: 40px 20px; color: var(--ink3); font-size: 14px; }

/* Responsive */
@media (max-width: 600px) {
  .op-identity-card { flex-direction: column; }
  .op-stats-grid { grid-template-columns: 1fr 1fr; }
  .op-content { padding: 20px 14px; }
}

/* Loading */
.op-loading {
  text-align: center; padding: 80px 20px; color: var(--ink3);
}

/* ── Premium Edit Modal & Avatar Hover ── */
.op-avatar { position: relative; cursor: pointer; }
.avatar-edit-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.6); color: #fff;
  font-size: 10px; font-weight: 700; padding: 4px;
  text-align: center; opacity: 0; transition: opacity .2s;
  pointer-events: none;
}
.op-avatar:hover .avatar-edit-overlay { opacity: 1; }

.op-modal {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
  background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
  padding: 20px;
}
.op-modal.open { opacity: 1; pointer-events: auto; }
.op-modal-card {
  background: #fff; border-radius: 20px; border: 1px solid var(--border);
  box-shadow: 0 20px 50px rgba(0,0,0,0.15); width: 100%; max-width: 480px;
  transform: scale(0.95); transition: transform .3s; overflow: hidden;
}
.op-modal.open .op-modal-card { transform: scale(1); }
.op-modal-header {
  padding: 18px 24px; border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.op-modal-title { font-size: 16px; font-weight: 900; color: var(--dark); }
.op-modal-close { font-size: 22px; cursor: pointer; color: var(--ink3); background: none; border: none; font-family: Cairo; }
.op-modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.op-modal-footer {
  padding: 16px 24px; border-top: 1.5px solid var(--border); background: var(--surface2);
  display: flex; justify-content: flex-end; gap: 12px;
}
.vr-fg { display: flex; flex-direction: column; gap: 6px; }
.vr-fg label { font-size: 13px; font-weight: 700; color: var(--ink2); }
.vr-fg input {
  padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-family: 'Cairo', sans-serif;
  font-size: 14px; color: var(--ink); background: var(--surface2);
  outline: none; transition: border-color .2s; width: 100%; box-sizing: border-box;
}
.vr-fg input:focus { border-color: var(--orange); }

</style>
</head>
<body>

<!-- ── Nav ── -->
<nav class="bz-standalone-nav">
  <a class="bz-nav-logo" href="/bazaars/">
    <div class="logo-text">
      <span class="logo-ar">مكاني</span>
      <span class="logo-en">Spot</span>
    </div>
    <span class="bz-nav-title">👤 الملف الشخصي</span>
  </a>
  <div class="bz-nav-right">
    <a class="bz-nav-back" href="/bazaars/">← البازارات</a>
  </div>
</nav>

<!-- ── المحتوى ── -->
<div class="op-page">
  <div class="op-content" id="op-content">
    <div class="op-loading">
      <div style="font-size:36px;margin-bottom:12px;display:inline-block;animation:spin 1s linear infinite">⏳</div>
      <div style="font-size:14px">جاري تحميل البروفايل…</div>
    </div>
  </div>
</div>


<!-- ── Edit Modal ── -->
<div class="op-modal" id="edit-profile-modal">
  <div class="op-modal-card">
    <div class="op-modal-header">
      <span class="op-modal-title">✍️ تعديل بيانات الحساب</span>
      <button class="op-modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="op-modal-body">
      <div class="vr-fg">
        <label>الاسم الكامل *</label>
        <input type="text" id="edit-name" placeholder="اسمك الكريم">
      </div>
      <div class="vr-fg">
        <label>رقم الواتساب *</label>
        <input type="tel" id="edit-whatsapp" placeholder="01xxxxxxxxx" dir="ltr">
      </div>
      <div class="vr-fg">
        <label>المنطقة / المحافظة *</label>
        <input type="text" id="edit-region" placeholder="مثال: التجمع الخامس، القاهرة">
      </div>
      <div id="edit-error" style="display:none;font-size:12px;color:#EF4444;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:8px 12px"></div>
    </div>
    <div class="op-modal-footer">
      <button class="btn" style="padding:8px 20px;border-radius:50px" onclick="closeEditModal()">إلغاء</button>
      <button class="btn btn-primary" style="padding:8px 24px;border-radius:50px" id="edit-save-btn" onclick="saveProfileDetails()">حفظ التعديلات</button>
    </div>
  </div>
</div>

<script src="profile.js" defer></script>
</body>
</html>
